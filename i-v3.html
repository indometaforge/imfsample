function dspAddItem(){
  const poId=document.getElementById('dsp-po-sel')?.value||S._dspNewPoId;
  const po=S.pos.find(p=>p.id===poId);
  if(!po){toast('Select a PO first');return}
  // Get customer stream type
  const cust=S.customers.find(c=>c.name===po.customer||c.id===po.customerId);
  const streamType=cust?.streamType||'oem';
  const streamLabel={oem:'OEM',spares:'Spares',market:'Market'}[streamType]||'OEM';
  // Build pending lines
  const pendingLines=(po.lines||[]).map(ln=>{
    const dispatched=S.dispatches.filter(d=>d.poId===poId).reduce((s,d)=>{
      const li=(d.items||[]).find(i=>i.lineId===ln.id);return s+(li?+li.qty:0);
    },0);
    const alreadyInThisInv=(_dspItems.filter(i=>i.lineId===ln.id).reduce((s,i)=>s+(+i.qty||0),0));
    const pending=Math.max(0,(+ln.qty||0)-dispatched-alreadyInThisInv);
    return{...ln,dispatched,alreadyInThisInv,pending};
  }).filter(ln=>ln.pending>0);
  if(!pendingLines.length){toast('All lines in this PO are fully dispatched');return}
  openModal(`<div class="mtit">Add Parts to Dispatch</div>
  <div class="ibox" style="margin-bottom:12px;font-size:12px">Each item requires a TAG scan. Customer stream: <strong>${streamLabel}</strong></div>
  ${pendingLines.map(ln=>`
  <div style="background:var(--bg);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px;border:.5px solid var(--bdr)">
    <div style="font-weight:700;font-size:13px;margin-bottom:2px">${ln.partName}</div>
    <div style="font-size:11px;color:var(--mut);margin-bottom:8px">${ln.partNo||'—'} · <strong style="color:var(--wa)">${ln.pending} ${ln.unit||'pcs'} pending</strong></div>
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <div class="bin-bc" style="flex:1">
        <input id="dsp-tag-input-${ln.id}" type="text" placeholder="Type or scan TAG (e.g. TAG001)..." oninput="this.value=this.value.toUpperCase()" autocomplete="off" spellcheck="false"
          onkeydown="if(event.key==='Enter'){event.preventDefault();dspLoadTag('${ln.id}','${streamType}',${ln.pending},'${poId}');}">
        <input type="hidden" id="dsp-tag-id-${ln.id}">
      </div>
      <button class="scan-btn" onclick="dspInlineScan('${ln.id}','${streamType}',${ln.pending},'${poId}')" title="Scan TAG">📷</button>
      <button class="btn btn-s btn-sm" onclick="dspLoadTag('${ln.id}','${streamType}',${ln.pending},'${poId}')">Load</button>
    </div>
    <div id="dsp-tag-info-${ln.id}" style="display:none;font-size:12px;padding:6px 8px;background:var(--acc3);border-radius:6px;margin-bottom:8px"></div>
    <div id="dsp-scan-area-${ln.id}" style="display:none;margin-bottom:8px"></div>
    <div style="display:flex;align-items:center;gap:8px">
      <input id="dsp-qty-${ln.id}" type="number" min="1" max="${ln.pending}" value="" placeholder="Qty" style="width:80px;padding:7px 10px;font-size:15px;font-weight:700;border:1.5px solid var(--bdr);border-radius:6px;text-align:center">
      <button class="btn btn-p btn-sm" style="flex:1" onclick="dspConfirmTagItem('${ln.id}','${poId}','${streamType}')">Add to Invoice ✓</button>
    </div>
  </div>`).join('')}
  <button class="btn btn-s mt8" onclick="closeModal()">Done</button>`);
}
// Load TAG inline without closing the modal
async function dspLoadTag(lineId,streamType,maxQty,poId){
  const input=document.getElementById('dsp-tag-input-'+lineId);
  const tagId=(input?.value||'').trim().toUpperCase();
  if(!tagId){toast('Type a TAG number first');return}
  await dspConfirmTagById(lineId,streamType,maxQty,poId,tagId);
}
// Inline QR scanner — opens a scan area within the same modal
function dspInlineScan(lineId,streamType,maxQty,poId){
  const scanArea=document.getElementById('dsp-scan-area-'+lineId);
  if(!scanArea)return;
  if(scanArea.style.display==='block'){
    // Toggle off
    scanArea.style.display='none';
    scanArea.innerHTML='';
    if(_html5Qr){_html5Qr.stop().catch(()=>{}).finally(()=>{_html5Qr.clear();_html5Qr=null;});}
    return;
  }
  scanArea.style.display='block';
  scanArea.innerHTML='<div id="qr-dsp-inline-'+lineId+'" style="width:100%;border-radius:8px;overflow:hidden;max-height:180px"></div>'
    +'<div class="tsm tmut" style="text-align:center;padding:4px">Scanning... tap 📷 again to cancel</div>';
  setTimeout(()=>{
    try{
      if(_html5Qr){_html5Qr.stop().catch(()=>{});}
      _html5Qr=new Html5Qrcode('qr-dsp-inline-'+lineId);
      _html5Qr.start({facingMode:'environment'},{fps:10,qrbox:{width:200,height:100},aspectRatio:1.6},
        (decoded)=>{
          if(_html5Qr){_html5Qr.stop().catch(()=>{}).finally(()=>{_html5Qr.clear();_html5Qr=null;});}
          scanArea.style.display='none';scanArea.innerHTML='';
          const inp=document.getElementById('dsp-tag-input-'+lineId);
          if(inp)inp.value=decoded.toUpperCase();
          dspConfirmTagById(lineId,streamType,maxQty,poId,decoded.toUpperCase());
        },()=>{}).catch(()=>{});
    }catch(e){scanArea.innerHTML='<div class="tsm tmut" style="color:var(--er);padding:4px">Camera not available — type TAG manually</div>';}
  },200);
}
function stopDspScan(){if(_html5Qr){_html5Qr.stop().catch(()=>{}).finally(()=>{_html5Qr.clear();_html5Qr=null;});}}
async function dspConfirmTagById(lineId,streamType,maxQty,poId,tagId){
  if(!tagId.match(/^TAG\d+$/)){toast('Invalid TAG format');return}
  // Check not already used in this session for same line
  if(_dspItems.find(i=>i.lineId===lineId&&i.tagId===tagId)){toast(tagId+' already added for this line');return}
  try{
    const doc=await db.collection('routeCards').doc(tagId).get();
    if(!doc.exists){toast(tagId+' not found');return}
    const card=doc.data();
    // Must be qc_cleared
    if(card.status!=='qc_cleared'){toast(`${tagId} is not QC cleared (status: ${card.status})`);return}
    // Check stream balance
    const streamQtyMap={oem:'qty_oem',spares:'qty_spares',market:'qty_market'};
    const streamField=streamQtyMap[streamType]||'qty_oem';
    const available=+card[streamField]||0;
    if(available<=0){toast(`${tagId} has no ${streamType.toUpperCase()} qty available (balance: 0)`);return}
    // Check customer match
    const po=S.pos.find(p=>p.id===poId);
    const poCustomer=po?.customer||'';
    if(card.customerName&&card.customerName!==poCustomer){
      // Warn but don't hard block — customer names might differ slightly
      console.warn(`TAG customer ${card.customerName} vs PO customer ${poCustomer}`);
    }
    // Update TAG info display inline in the modal
    const tagInput=document.getElementById('dsp-tag-input-'+lineId);
    const hiddenInput=document.getElementById('dsp-tag-id-'+lineId);
    const infoDiv=document.getElementById('dsp-tag-info-'+lineId);
    const qtyInput=document.getElementById('dsp-qty-'+lineId);
    if(tagInput){tagInput.value=tagId;tagInput.style.borderColor='var(--ok)';}
    if(hiddenInput)hiddenInput.value=tagId;
    if(infoDiv){
      infoDiv.style.display='block';
      infoDiv.innerHTML='<span style="color:var(--ok);font-weight:700">✅ '+tagId+'</span>'
        +' · '+card.partName
        +' · Batch: '+(card.batchCode||'—')
        +(card.heatCode?' · 🔥 '+card.heatCode:'')
        +' · <strong>'+available+' '+streamType.toUpperCase()+' pcs available</strong>';
    }
    if(qtyInput){
      const maxAllowed=Math.min(maxQty,available);
      qtyInput.max=maxAllowed;
      qtyInput.value=maxAllowed>0?maxAllowed:'';
      qtyInput.style.borderColor='var(--ok)';
    }
    // Store TAG data temporarily
    if(!window._dspTagCache)window._dspTagCache={};
    window._dspTagCache[lineId]={tagId,batchCode:card.batchCode||'',heatCode:card.heatCode||'',partName:card.partName,partNo:card.partNo,streamType,streamField,available};
    toast(`✅ ${tagId} — ${available} ${streamType.toUpperCase()} pcs available`);
  }catch(e){toast('Error fetching TAG: '+e.message)}
}
async function dspConfirmTagItem(lineId,poId,streamType){
  // Read qty from input
  const qtyInput=document.getElementById('dsp-qty-'+lineId);
  const qty=parseInt(qtyInput?.value)||0;
  // Get TAG data from cache (most reliable — set by dspConfirmTagById)
  const tagData=window._dspTagCache?.[lineId];
  // Also try hidden input as fallback
  const hiddenInput=document.getElementById('dsp-tag-id-'+lineId);
  const tagId=(tagData?.tagId)||(hiddenInput?.value)||'';
  if(!tagId){toast('Load a TAG first — type TAG number and tap Load');return}
  if(!qty||qty<1){toast('Enter quantity to dispatch');return}
  if(!tagData){toast('TAG info missing — tap Load again');return}
  if(qty>tagData.available){toast('Only '+tagData.available+' '+streamType.toUpperCase()+' pcs available on this TAG');return}
  const po=S.pos.find(p=>p.id===poId);
  const ln=(po?.lines||[]).find(l=>l.id===lineId);
  if(!ln){toast('PO line not found');return}
  // Check PO pending qty
  const dispatched=S.dispatches.filter(d=>d.poId===poId).reduce((s,d)=>{
    const li=(d.items||[]).find(i=>i.lineId===lineId);return s+(li?+li.qty:0);
  },0);
  const alreadyInThisInv=_dspItems.filter(i=>i.lineId===lineId).reduce((s,i)=>s+(+i.qty||0),0);
  const maxPOQty=(+ln.qty||0)-dispatched-alreadyInThisInv;
  if(qty>maxPOQty){toast('PO allows max '+maxPOQty+' more pcs for this line');return}
  // Add to session items
  _dspItems.push({
    lineId,
    partId:ln.partId||tagData.partId,
    partNo:ln.partNo||tagData.partNo,
    partName:ln.partName||tagData.partName,
    qty,
    unit:ln.unit||'pcs',
    rate:ln.rate||0,
    tagId,
    batchCode:tagData.batchCode||'',
    heatCode:tagData.heatCode||'',
    streamType,
    streamField:tagData.streamField||'qty_oem'
  });
  // Clean up this line's state
  const tagInputEl=document.getElementById('dsp-tag-input-'+lineId);
  const infoDiv=document.getElementById('dsp-tag-info-'+lineId);
  if(tagInputEl){tagInputEl.value='';tagInputEl.style.borderColor='';}
  if(hiddenInput)hiddenInput.value='';
  if(infoDiv)infoDiv.style.display='none';
  if(qtyInput){qtyInput.value='';qtyInput.style.borderColor='';}
  if(window._dspTagCache)delete window._dspTagCache[lineId];
  // Update the items list in the background screen
  renderDspItemsList();
  toast(tagData.partName+' ('+qty+' pcs) added to invoice ✓');
  // Close modal so user can see the items list and save
  closeModal();
}

async function saveDispatch(){
  const prefix=document.getElementById('dsp-inv-prefix')?.textContent||getFYPrefix();
  const suffix=document.getElementById('dsp-inv-suffix')?.value.trim()||'';
  const invoiceNo=suffix?prefix+suffix:(document.getElementById('dsp-inv').value.trim());
  const date=document.getElementById('dsp-date').value;
  const poId=document.getElementById('dsp-po-sel')?.value||S._dspNewPoId;
  if(!invoiceNo){toast('Invoice number required');return}
  if(!poId){toast('Select a PO');return}
  if(!_dspItems.length){toast('Add at least one part');return}
  // Validate all items have TAGs
  const missingTag=_dspItems.filter(i=>!i.tagId);
  if(missingTag.length){toast(`${missingTag.length} item(s) missing TAG scan — all items require a TAG`);return}
  const po=S.pos.find(p=>p.id===poId);
  const d={
    invoiceNo,date,poId,
    customer:po?po.customer:'',
    items:_dspItems,
    transportMode:document.getElementById('dsp-transport').value,
    vehicleNo:document.getElementById('dsp-vehicle').value.trim(),
    remarks:document.getElementById('dsp-remarks').value.trim(),
    totalValue:_dspItems.reduce((s,i)=>s+(i.qty*(i.rate||0)),0),
    createdBy:S.sess.userId,createdAt:nowTS()
  };
  const btn=document.querySelector('#s-dsp-new .btn-p');
  if(btn){btn.disabled=true;btn.textContent='Saving...';}
  try{
    // Batch write: save dispatch + update each routeCard's stream balance
    const fbBatch=db.batch();
    const dspRef=db.collection('dispatches').doc();
    fbBatch.set(dspRef,d);
    // Group items by tagId to handle same TAG dispatched for multiple lines
    const tagUpdates={};
    _dspItems.forEach(item=>{
      if(!item.tagId)return;
      if(!tagUpdates[item.tagId])tagUpdates[item.tagId]={streamField:item.streamField,qty:0};
      tagUpdates[item.tagId].qty+=item.qty;
    });
    for(const[tagId,upd] of Object.entries(tagUpdates)){
      const tagRef=db.collection('routeCards').doc(tagId);
      // Decrement stream balance and increment dispatchedQty
      const tagDoc=await tagRef.get();
      if(tagDoc.exists){
        const td=tagDoc.data();
        const newStreamQty=Math.max(0,(+td[upd.streamField]||0)-upd.qty);
        const newDispatched=(+td.dispatchedQty||0)+upd.qty;
        // Check if all streams now zero
        const newOEM=upd.streamField==='qty_oem'?newStreamQty:(+td.qty_oem||0);
        const newSpares=upd.streamField==='qty_spares'?newStreamQty:(+td.qty_spares||0);
        const newMarket=upd.streamField==='qty_market'?newStreamQty:(+td.qty_market||0);
        const allZero=(newOEM+newSpares+newMarket)===0;
        fbBatch.update(tagRef,{
          [upd.streamField]:newStreamQty,
          dispatchedQty:newDispatched,
          status:allZero?'dispatched':'qc_cleared',
          updatedAt:nowTS()
        });
      }
    }
    await fbBatch.commit();
    toast('Dispatch saved ✓');
    _dspItems=[];
    go('dsp-po-detail','dsp-new');
    renderDspPoDetail(poId);
  }catch(e){
    toast('Error: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='💾 Save Dispatch';}
  }
}

function renderTrackBody(){
  const w=document.getElementById('trk-body');if(!w)return;
  // Filter POs by month and customer
  const filtPos=S.pos.filter(p=>
    (_trkCust==='all'||p.customer===_trkCust)&&
    (!_trkMonth||(p.month&&p.month===_trkMonth)||(p.poDate&&p.poDate.startsWith(_trkMonth)))
  );

  // ── Monthly Billing Summary Widget ──────────────────────────────
  const sw=document.getElementById('trk-summary');
  if(sw){
    // Compute all dispatches in the selected month
    const monthDispatches=S.dispatches.filter(d=>d.date&&d.date.startsWith(_trkMonth));
    let totalBilled=0;let totalPcs=0;let invoiceCount=monthDispatches.length;
    monthDispatches.forEach(d=>{totalBilled+=(+d.totalValue||0);totalPcs+=(d.items||[]).reduce((s,i)=>s+(+i.qty||0),0);});
    sw.innerHTML=`
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px">
        <div style="background:var(--bg);border:.5px solid var(--bdr);border-radius:var(--rs);padding:10px 12px;text-align:center">
          <div style="font-size:11px;color:var(--mut);margin-bottom:4px">Month Billing</div>
          <div style="font-size:18px;font-weight:700;color:var(--ok)">₹${totalBilled.toLocaleString('en-IN')}</div>
        </div>
        <div style="background:var(--bg);border:.5px solid var(--bdr);border-radius:var(--rs);padding:10px 12px;text-align:center">
          <div style="font-size:11px;color:var(--mut);margin-bottom:4px">Pieces Dispatched</div>
          <div style="font-size:18px;font-weight:700;color:var(--acc)">${totalPcs.toLocaleString('en-IN')}</div>
        </div>
        <div style="background:var(--bg);border:.5px solid var(--bdr);border-radius:var(--rs);padding:10px 12px;text-align:center">
          <div style="font-size:11px;color:var(--mut);margin-bottom:4px">Invoices</div>
          <div style="font-size:18px;font-weight:700">${invoiceCount}</div>
        </div>
      </div>`;
  }
  // ────────────────────────────────────────────────────────────────
  if(!filtPos.length){w.innerHTML=`<div class="empty"><div class="empty-ic">📊</div><h3>No POs for this period</h3></div>`;return}

  // Build grouped by customer
  const byCustomer={};
  filtPos.forEach(po=>{
    if(!byCustomer[po.customer])byCustomer[po.customer]=[];
    byCustomer[po.customer].push(po);
  });

  let html='';
  Object.entries(byCustomer).forEach(([cust,poList])=>{
    html+=`<div class="slbl">${cust}</div>`;
    // Flatten all lines across POs for this customer
    poList.forEach(po=>{
      html+=`<div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">
        <div style="background:var(--bg);padding:8px 12px;font-size:12px;font-weight:700;border-bottom:.5px solid var(--bdr)">
          ${po.poNo} <span style="font-weight:400;color:var(--mut)">· ${po.poDate}</span>
          <span class="bdg ${po.status==='closed'?'bdg-r':'bdg-g'}" style="margin-left:6px">${po.status==='closed'?'Closed':'Open'}</span>
        </div>
        <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:480px">
          <thead><tr style="background:var(--bg)">
            <th style="padding:7px 10px;text-align:left;color:var(--mut)">Part</th>
            <th style="padding:7px 6px;text-align:right;color:var(--mut)">Scheduled</th>
            <th style="padding:7px 6px;text-align:right;color:var(--mut)">Dispatched</th>
            <th style="padding:7px 6px;text-align:right;color:var(--mut)">Pending</th>
            <th style="padding:7px 6px;text-align:right;color:var(--mut)">Due</th>
            <th style="padding:7px 6px;text-align:left;color:var(--mut)">Invoices</th>
          </tr></thead>
          <tbody>
          ${(po.lines||[]).map(ln=>{
            const lineDisps=[];
            S.dispatches.filter(d=>d.poId===po.id).forEach(d=>{
              const item=(d.items||[]).find(i=>i.lineId===ln.id);
              if(item)lineDisps.push({inv:d.invoiceNo,date:d.date,qty:+item.qty});
            });
            const dispatched=lineDisps.reduce((s,d)=>s+d.qty,0);
            const pending=Math.max(0,(+ln.qty||0)-dispatched);
            const overdue=pending>0&&ln.dueDate<dateStr();
            const pct=ln.qty>0?Math.min(100,Math.round(dispatched/ln.qty*100)):0;
            return`<tr style="border-top:.5px solid var(--bdr)${overdue?';background:#fef2f2':''}">
              <td style="padding:7px 10px"><div style="font-weight:600">${ln.partName}</div><div style="font-size:10px;color:var(--mut)">${ln.partNo||'—'}</div></td>
              <td style="padding:7px 6px;text-align:right;font-weight:600">${ln.qty}</td>
              <td style="padding:7px 6px;text-align:right;font-weight:700;color:var(--ok)">${dispatched}</td>
              <td style="padding:7px 6px;text-align:right;font-weight:700;color:${overdue?'var(--er)':pending>0?'var(--wa)':'var(--ok)'}">${pending}</td>
              <td style="padding:7px 6px;text-align:right;font-size:11px;color:${overdue?'var(--er)':'var(--mut)'}">${ln.dueDate}${overdue?' ⚠️':''}</td>
              <td style="padding:7px 6px;font-size:10px;color:var(--mut)">${lineDisps.map(d=>`${d.inv} (${d.qty})`).join(', ')||'—'}</td>
            </tr>`;
          }).join('')}
          </tbody>
        </table></div>
      </div>`;
    });
  });
  w.innerHTML=html;
}

async function clearTestData(){
  if(!TEST_MODE){toast('Not in test mode');return;}
  if(!confirm('Delete ALL test data?\n\nTEST_ collections will be wiped. Masters are NOT affected.'))return;
  const cols=['TEST_plans','TEST_actuals','TEST_inward','TEST_routeCards','TEST_requisitions',
    'TEST_setupApprovals','TEST_qcInspections','TEST_htCharges','TEST_breakdowns',
    'TEST_machineStatus','TEST_pmLogs','TEST_sparesRequests','TEST_dispatches','TEST_pos',
    'TEST_scrapLedger','TEST_batches','TEST_cards','TEST_pmSchedules'];
  const btn=document.querySelector('#test-banner button');
  if(btn){btn.disabled=true;btn.textContent='Clearing...';}
  const rawDb=firebase.firestore();
  let total=0;
  try{
    for(const col of cols){
      let snap=await rawDb.collection(col).limit(200).get();
      while(!snap.empty){
        const wb=rawDb.batch();
        snap.docs.forEach(d=>wb.delete(rawDb.collection(col).doc(d.id)));
        await wb.commit();
        total+=snap.docs.length;
        snap=await rawDb.collection(col).limit(200).get();
      }
    }
    toast('✅ Cleared '+total+' test records');
    S.plans=[];S.actuals=[];S.inward=[];S.routeCards=[];S.requisitions=[];
    S.setupApprovals=[];S.qcInspections=[];S.htCharges=[];S.breakdowns=[];
    S.machineStatus={};S.pmLogs=[];S.sparesRequests=[];S.dispatches=[];S.pos=[];
    S.batches=[];S.cards=[];S.pmSchedules=[];
    go('home');renderHome();
  }catch(e){toast('Error: '+e.message);}
  if(btn){btn.disabled=false;btn.textContent='🗑 Clear All Test Data';}
}
