async function savePartOp(id){
  const partId=document.getElementById('pof-p').value;
  const opId=document.getElementById('pof-o').value;
  const ct=parseFloat(document.getElementById('pof-ct').value);
  const seqNo=parseInt(document.getElementById('pof-sq').value);
  if(!partId||!opId){toast('Part and operation required');return}
  if(!ct||ct<=0){toast('Valid cycle time required');return}
  if(!seqNo||seqNo<1){toast('Sequence number required');return}
  const p=S.parts.find(x=>x.id===partId);
  const o=S.operations.find(x=>x.id===opId);
  const machId=document.getElementById('pof-m').value;
  const mach=S.machines.find(x=>x.id===machId);
  // Check duplicate part+op combo (excluding self)
  const dup=S.partOps.find(x=>x.partId===partId&&x.opId===opId&&x.id!==id);
  if(dup){toast('This part-operation combination already exists');return}
  const d={partId,opId,cycleTime:ct,seqNo,machineId:machId||'',machineName:mach?mach.name:'',stage:o?o.stage:'',setupTimeStd:parseFloat(document.getElementById('pof-st').value)||0,partNo:p?p.no:'',partName:p?p.name:''};
  try{
    if(id){await db.collection('partOps').doc(id).update(d);}
    else{await db.collection('partOps').add({...d,createdAt:nowTS()});}
    closeModal();toast(id?'Updated ✓':'Added ✓');
  }catch(e){toast('Error: '+e.message)}
}

  try{await db.collection('partOps').doc(id).delete();closeModal();toast('Deleted');}

}

// ── Auto-migrate existing part cust names → customers collection ──
async function migrateCustFromParts(){
  if(!S.parts.length)return;
  const existingNames=new Set(S.customers.map(c=>c.name.toLowerCase()));
  const uniqueCusts=[...new Set(S.parts.map(p=>p.cust).filter(Boolean))];
  const toAdd=uniqueCusts.filter(n=>n&&!existingNames.has(n.toLowerCase()));
  if(!toAdd.length)return;
  // Default stream mapping for known customers
  const streamMap={'M&M':'oem','PVPL':'oem','ATUL':'oem','CPGD':'oem','MLR':'market'};
  const batch=db.batch();
  toAdd.forEach(name=>{
    const ref=db.collection('customers').doc();
    const code=name.replace(/[^A-Z0-9]/gi,'').toUpperCase().slice(0,5)||'CUST';
    batch.set(ref,{name,code,streamType:streamMap[name]||'oem',contactPerson:'',phone:'',email:'',migratedFromParts:true,createdAt:nowTS()});
    // Add to local state immediately
    S.customers.push({id:ref.id,name,code,streamType:streamMap[name]||'oem',contactPerson:'',phone:'',email:'',migratedFromParts:true});
  });
  await batch.commit();
  if(toAdd.length)console.log(`Migrated ${toAdd.length} customers from parts:`,toAdd);
}

function genReqNo(){

      <div class="f"><label>Notes</label><input id="rq-notes" type="text" value="${req?req.notes||'':''}" placeholder="Optional"></div>
    </div>
    <div class="card">
      <div class="card-hd" style="display:flex;justify-content:space-between;align-items:center">
        <span>🔩 Material Lines</span>
        <button class="btn btn-s btn-sm" onclick="reqShowAddLine()">+ Add Part</button>
      </div>
      <div id="req-add-row" style="display:none;background:var(--acc3);border:.5px solid var(--acc2);border-radius:var(--rs);padding:10px 12px;margin-bottom:10px">
        <div class="f" style="margin-bottom:8px">
          <label style="font-size:11px;font-weight:600;color:var(--mut)">Part *</label>
          <input id="rq-new-part" type="text" placeholder="Type to search part name or number..." oninput="reqPartSearch(this)" onblur="setTimeout(hideGlobalDrop,150)" autocomplete="off">
          <input type="hidden" id="rq-new-pid">
          <input type="hidden" id="rq-new-pno">
          <input type="hidden" id="rq-new-cid">
          <input type="hidden" id="rq-new-cname">
        </div>
        <div class="row2" style="margin-bottom:8px">
          <div class="f" style="margin:0"><label style="font-size:11px;font-weight:600;color:var(--mut)">Qty Required *</label><input id="rq-new-qty" type="number" min="1" placeholder="e.g. 100"></div>
          <div class="f" style="margin:0"><label style="font-size:11px;font-weight:600;color:var(--mut)">Lot Code (optional)</label><input id="rq-new-lot" type="text" placeholder="e.g. 20250610-IMF-DLV001"></div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-p btn-sm" style="flex:1" onclick="reqConfirmLine()">Add ✓</button>

    <div style="height:24px"></div>

  reqRenderLines();
}

function reqShowAddLine(){const r=document.getElementById('req-add-row');if(r){r.style.display='block';setTimeout(()=>{const i=document.getElementById('rq-new-part');if(i)i.focus();},80);}}
function reqHideAddLine(){
  const r=document.getElementById('req-add-row');if(r)r.style.display='none';
  ['rq-new-part','rq-new-pid','rq-new-pno','rq-new-cid','rq-new-cname','rq-new-qty','rq-new-lot'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  _reqClearStockBadge();
}
function reqPartSearch(inp){
  const q=inp.value.toLowerCase();if(!q){hideGlobalDrop();_reqClearStockBadge();return}
  const matches=S.parts.filter(p=>p.name.toLowerCase().includes(q)||p.no.toLowerCase().includes(q)).slice(0,15);
  showGDrop(inp,matches,p=>{
    inp.value=p.name;
    document.getElementById('rq-new-pid').value=p.id;
    document.getElementById('rq-new-pno').value=p.no;
    // Auto-fill customer from part
    const cust=S.customers.find(c=>c.id===p.customerId)||(p.cust?S.customers.find(c=>c.name===p.cust):null);
    document.getElementById('rq-new-cid').value=cust?cust.id:'';
    document.getElementById('rq-new-cname').value=cust?cust.name:(p.cust||'');
    // Show available store stock badge
    _reqShowStockBadge(p.id);
  });
}
function _reqCalcStock(partId){
  // Sum all inward qty for this part across all lots
  const totalIn=S.inward.filter(iw=>iw.partId===partId).reduce((s,iw)=>s+(+iw.qty||0),0);
  // Sum all issued qty for this part (from routeCards)
  const totalIssued=S.routeCards.filter(rc=>rc.partId===partId).reduce((s,rc)=>s+(+rc.issuedQty||0),0);
  return Math.max(0,totalIn-totalIssued);
}
function _reqShowStockBadge(partId){
  let badge=document.getElementById('rq-stock-badge');
  if(!badge){
    badge=document.createElement('div');
    badge.id='rq-stock-badge';
    badge.style.cssText='font-size:12px;font-weight:600;padding:4px 10px;border-radius:4px;margin-top:6px;display:inline-block';
    const partField=document.getElementById('rq-new-part');
    if(partField&&partField.parentNode)partField.parentNode.appendChild(badge);
  }
  const avail=_reqCalcStock(partId);
  badge.textContent='📦 Available Store Stock: '+avail+' pcs';
  badge.style.background=avail>0?'#f0fdf4':'#fef2f2';
  badge.style.color=avail>0?'#15803d':'#dc2626';
  badge.style.border=avail>0?'.5px solid #86efac':'.5px solid #fca5a5';
}
function _reqClearStockBadge(){const b=document.getElementById('rq-stock-badge');if(b)b.remove();}
function reqConfirmLine(){
  const name=document.getElementById('rq-new-part')?.value.trim();
  const pid=document.getElementById('rq-new-pid')?.value||'';
  const pno=document.getElementById('rq-new-pno')?.value||'';
  const cid=document.getElementById('rq-new-cid')?.value||'';
  const cname=document.getElementById('rq-new-cname')?.value||'';
  const qty=parseInt(document.getElementById('rq-new-qty')?.value)||0;
  const lot=document.getElementById('rq-new-lot')?.value.trim()||'';
  if(!name||!pid){toast('Search and select a part first');return}
  if(!qty||qty<1){toast('Enter a valid quantity');return}
  _reqLines.push({lineNo:_reqLines.length+1,partId:pid,partNo:pno,partName:name,customerId:cid,customerName:cname,masterLotCode:lot,qtyRequested:qty,qtyApproved:0,qtyIssued:0});
  reqHideAddLine();reqRenderLines();
}
function reqRenderLines(){
  const w=document.getElementById('req-lines-list');if(!w)return;
  if(!_reqLines.length){w.innerHTML=`<div class="tsm tmut" style="padding:8px 0;text-align:center;color:var(--dim)">No parts added yet</div>`;return}
  w.innerHTML=_reqLines.map((l,i)=>`
    <div style="background:#fff;border-radius:var(--rs);padding:10px 12px;margin-bottom:8px;border:.5px solid var(--bdr)">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div style="flex:1">
          <div style="font-weight:700;font-size:13px">${l.partName}</div>
          <div style="font-family:monospace;font-size:11px;color:var(--mut)">${l.partNo}${l.customerName?' · '+l.customerName:''}</div>
          ${l.masterLotCode?`<div style="font-size:11px;color:var(--ok);margin-top:2px">🏷 ${l.masterLotCode}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-weight:700;font-size:16px;color:var(--acc)">${l.qtyRequested}</div>
          <div style="font-size:10px;color:var(--mut)">pcs</div>
        </div>
        <button onclick="_reqLines.splice(${i},1);reqRenderLines()" style="width:26px;height:26px;border-radius:6px;border:none;background:var(--erbg);color:var(--er);font-size:15px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">✕</button>
      </div>
    </div>`).join('');
}

async function saveReq(editId){
  if(!_reqLines.length){toast('Add at least one part');return}
  const date=document.getElementById('rq-date').value;
  const neededBy=document.getElementById('rq-needby').value;
  if(!date){toast('Date required');return}
  const reqNo=editId?S.requisitions.find(r=>r.id===editId)?.reqNo:genReqNo();
  const d={reqNo,date,neededBy,notes:document.getElementById('rq-notes').value.trim(),lines:_reqLines,status:'pending',requestedBy:S.sess.userId,requestedByName:S.sess.name,approvedBy:'',approvedByName:'',approvedAt:'',rejectionReason:''};
  try{
    if(editId){await db.collection('requisitions').doc(editId).update({...d,updatedAt:nowTS()});}
    else{await db.collection('requisitions').add({...d,createdAt:nowTS()});}
    toast(editId?'Requisition updated ✓':'Requisition submitted ✓');
    go('store-req-list','store-req-new');renderReqList();
  }catch(e){toast('Error: '+e.message)}
}

let _reqFilt='all';
function renderReqList(){
  const counts={pending:S.requisitions.filter(r=>r.status==='pending').length,approved:S.requisitions.filter(r=>r.status==='approved').length,partial:S.requisitions.filter(r=>r.status==='partial').length};
  document.getElementById('s-store-req-list').innerHTML=`<div class="hdr"><button class="hdr-back" onclick="goBack()">←</button><div class="hdr-info"><div class="hdr-title">Requisitions</div><div class="hdr-sub">${S.requisitions.length} records</div></div><button class="hdr-act" onclick="go('store-req-new','store-req-list');renderReqNew()">+ New</button></div>

    <div class="mfilt">
      <select onchange="_reqFilt=this.value;applyReqFilter()">

        <option value="approved">Approved ${counts.approved?'('+counts.approved+')':''}</option>
        <option value="partial">Partial ${counts.partial?'('+counts.partial+')':''}</option>
        <option value="fulfilled">Fulfilled</option>
        <option value="rejected">Rejected</option>
      </select>

    <div id="req-list"></div>

}
function applyReqFilter(){
  const list=S.requisitions.filter(r=>_reqFilt==='all'||r.status===_reqFilt);
  const w=document.getElementById('req-list');if(!w)return;
  if(!list.length){w.innerHTML=`<div class="empty"><div class="empty-ic">📋</div><h3>No requisitions</h3><p>Tap + New to create a material request.</p></div>`;return}
  const stBdg={pending:'bdg-a',approved:'bdg-g',partial:'bdg-b',fulfilled:'bdg-g',rejected:'bdg-r'};
  const stLbl={pending:'Pending Approval',approved:'Approved',partial:'Partially Issued',fulfilled:'Fulfilled',rejected:'Rejected'};
  w.innerHTML=list.map(r=>`
    <div class="card" style="margin-bottom:10px" onclick="viewReq('${r.id}')">
      <div class="fbw" style="margin-bottom:6px">
        <div><div style="font-weight:700">${r.reqNo||'—'}</div>
        <div class="tsm tmut">${r.date}${r.neededBy?' · Needed by '+r.neededBy:''}</div></div>
        <span class="bdg ${stBdg[r.status]||'bdg-gr'}">${stLbl[r.status]||r.status}</span>
      </div>
      <div style="font-size:12px;color:var(--mut);margin-bottom:6px">By ${r.requestedByName||'—'}</div>
      ${(r.lines||[]).map(l=>`<div class="rrow" style="padding:3px 0"><span class="tsm" style="font-weight:600">${l.partName}</span><span class="tsm tmut">${l.partNo}</span><span class="tsm" style="font-weight:700;color:var(--acc)">${l.qtyRequested} pcs</span></div>`).join('')}
      ${r.status==='pending'&&S.sess.userId===r.requestedBy?`<button class="btn btn-d btn-sm" style="margin-top:8px" onclick="event.stopPropagation();cancelReq('${r.id}')">Cancel</button>`:''}
    </div>`).join('');
}
function viewReq(id){
  const r=S.requisitions.find(x=>x.id===id);if(!r)return;
  const stBdg={pending:'bdg-a',approved:'bdg-g',partial:'bdg-b',fulfilled:'bdg-g',rejected:'bdg-r'};
  const stLbl={pending:'Pending Approval',approved:'Approved',partial:'Partially Issued',fulfilled:'Fulfilled',rejected:'Rejected'};
  let h=`<div class="mtit">${r.reqNo}</div>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px"><span class="bdg ${stBdg[r.status]||'bdg-gr'}">${stLbl[r.status]||r.status}</span><span class="tsm tmut">${r.date}</span></div>`;
  (r.lines||[]).forEach(l=>{
    const issued=S.routeCards.filter(rc=>rc.requisitionId===r.id&&rc.lineNo===l.lineNo).reduce((s,rc)=>s+(+rc.issuedQty||0),0);
    h+=`<div style="background:var(--bg);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px">
      <div style="font-weight:700">${l.partName} <span style="font-family:monospace;font-size:11px;color:var(--mut)">${l.partNo}</span></div>
      <div class="tsm tmut">${l.customerName||'—'}</div>
      <div style="display:flex;gap:12px;margin-top:6px;font-size:12px">
        <span>Requested: <strong>${l.qtyRequested}</strong></span>
        ${l.qtyApproved?`<span>Approved: <strong style="color:var(--ok)">${l.qtyApproved}</strong></span>`:''}
        ${issued?`<span>Issued: <strong style="color:var(--acc)">${issued}</strong></span>`:''}
      </div>
    </div>`;
  });
  if(r.approvedByName)h+=`<div class="tsm tmut" style="margin-bottom:4px">Approved by ${r.approvedByName}</div>`;
  if(r.rejectionReason)h+=`<div class="ibox" style="background:var(--erbg);border-color:var(--er);color:var(--er)">Rejected: ${r.rejectionReason}</div>`;
  if(r.notes)h+=`<div class="tsm tmut" style="margin-top:8px">${r.notes}</div>`;
  h+=`<button class="btn btn-s mt12" onclick="closeModal()">Close</button>`;
  if(r.status==='pending'&&r.requestedBy===S.sess.userId)h+=`<button class="btn btn-s mt8" onclick="closeModal();go('store-req-new','store-req-list');renderReqNew('${r.id}')">Edit</button>`;
  openModal(h);
}
async function cancelReq(id){
  if(!confirm('Cancel this requisition?'))return;
  try{await db.collection('requisitions').doc(id).update({status:'rejected',rejectionReason:'Cancelled by requester',updatedAt:nowTS()});toast('Requisition cancelled');}
  catch(e){toast('Error: '+e.message)}
}

function renderApprovals(){
  if(!isAdmin()){toast('Admin access required');goBack();return}
  const pending=S.requisitions.filter(r=>r.status==='pending');
  const recent=S.requisitions.filter(r=>['approved','rejected'].includes(r.status)).slice(0,10);
  document.getElementById('s-store-approvals').innerHTML=`<div class="hdr"><button class="hdr-back" onclick="goBack()">←</button><div class="hdr-info"><div class="hdr-title">Approvals</div><div class="hdr-sub">${pending.length} pending</div></div></div>
  <div class="pad">
    ${pending.length?`<div class="slbl">Awaiting Approval (${pending.length})</div>`+pending.map(r=>approvalCard(r,true)).join(''):`<div class="card" style="text-align:center;padding:24px"><div style="font-size:32px;margin-bottom:8px">✅</div><div style="font-weight:600">No pending approvals</div></div>`}
    ${recent.length?`<div class="slbl" style="margin-top:16px">Recently Processed</div>`+recent.map(r=>approvalCard(r,false)).join(''):''}

function approvalCard(r,isPending){
  const stBdg={approved:'bdg-g',rejected:'bdg-r',pending:'bdg-a'};
  return`<div class="card" style="margin-bottom:10px">
    <div class="fbw" style="margin-bottom:8px">
      <div><div style="font-weight:700">${r.reqNo}</div><div class="tsm tmut">By ${r.requestedByName||'—'} · ${r.date}</div></div>
      <span class="bdg ${stBdg[r.status]||'bdg-gr'}">${r.status}</span>
    </div>
    ${(r.lines||[]).map(l=>`
      <div style="background:var(--bg);border-radius:var(--rs);padding:8px 10px;margin-bottom:6px">
        <div style="font-weight:700;font-size:13px">${l.partName} <span style="font-family:monospace;font-size:11px;color:var(--mut)">${l.partNo}</span></div>
        <div class="tsm tmut">${l.customerName||'—'}</div>
        <div style="display:flex;gap:8px;margin-top:6px;align-items:center">
          <span class="tsm">Requested: <strong>${l.qtyRequested} pcs</strong></span>
          ${isPending?`<input id="appr-qty-${r.id}-${l.lineNo}" type="number" min="0" max="${l.qtyRequested}" value="${l.qtyRequested}" style="width:80px;padding:5px 8px;font-size:13px;font-weight:700;border:1.5px solid var(--bdr);border-radius:6px;text-align:center" placeholder="Approve qty">`:
          l.qtyApproved?`<span style="color:var(--ok);font-weight:700">Approved: ${l.qtyApproved}</span>`:''}
        </div>
      </div>`).join('')}
    ${isPending?`
      <div class="f" style="margin-top:8px"><label style="font-size:11px">Remarks (optional)</label><input id="appr-rmk-${r.id}" type="text" placeholder="Notes for requester..."></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-p" style="flex:1" onclick="approveReq('${r.id}')">✅ Approve</button>
        <button class="btn btn-d" style="flex:1" onclick="rejectReq('${r.id}')">✗ Reject</button>
      </div>`:
      r.approvedByName?`<div class="tsm tmut" style="margin-top:6px">${r.status==='approved'?'Approved':'Rejected'} by ${r.approvedByName}</div>`:''}
  </div>`;
}
async function approveReq(id){
  const r=S.requisitions.find(x=>x.id===id);if(!r)return;
  const updatedLines=r.lines.map(l=>{
    const qtyEl=document.getElementById(`appr-qty-${id}-${l.lineNo}`);
    const qty=qtyEl?parseInt(qtyEl.value)||0:l.qtyRequested;
    return{...l,qtyApproved:Math.min(qty,l.qtyRequested)};
  });
  const rmk=document.getElementById(`appr-rmk-${id}`)?.value.trim()||'';
  try{
    await db.collection('requisitions').doc(id).update({status:'approved',lines:updatedLines,approvedBy:S.sess.userId,approvedByName:S.sess.name,approvedAt:nowTS(),notes:rmk||r.notes||'',updatedAt:nowTS()});
    toast('Requisition approved ✓');
  }catch(e){toast('Error: '+e.message)}
}
async function rejectReq(id){
  const rmk=document.getElementById(`appr-rmk-${id}`)?.value.trim();
  if(!rmk){toast('Please enter a reason for rejection');return}
  try{
    await db.collection('requisitions').doc(id).update({status:'rejected',rejectionReason:rmk,approvedBy:S.sess.userId,approvedByName:S.sess.name,approvedAt:nowTS(),updatedAt:nowTS()});
    toast('Requisition rejected');
  }catch(e){toast('Error: '+e.message)}
}

// STORE ISSUE — Multi-TAG issuance
// ══════════════════════════════════════════
let _issReq=null;       // selected requisition
let _issLine=null;      // selected line within requisition
let _issTags=[];        // [{tagId, qty}] — tags scanned this session
let _issBatchCode='';   // shared batchCode for this session

function renderStoreIssue(){
  _issReq=null;_issLine=null;_issTags=[];
  const approved=S.requisitions.filter(r=>r.status==='approved'||r.status==='partial');
  document.getElementById('s-store-issue').innerHTML=`<div class="hdr"><button class="hdr-back" onclick="goBack()">←</button><div class="hdr-info"><div class="hdr-title">Issue to WIP</div><div class="hdr-sub">Scan TAGs to issue</div></div></div>
  <div class="pad">
    ${!approved.length?`<div class="card" style="text-align:center;padding:24px"><div style="font-size:32px;margin-bottom:8px">📋</div><div style="font-weight:600;margin-bottom:4px">No approved requisitions</div><div class="tsm tmut">Requisitions must be approved by Admin before issuing</div></div>`:`
    <div class="slbl">Select Requisition to Fulfill</div>
    ${approved.map(r=>`
      <div class="card" style="margin-bottom:8px;cursor:pointer;data-req-id="${r.id}" style="margin-bottom:8px;cursor:pointer;border:1.5px solid var(--bdr)" onclick="issSelectReq('${r.id}')">
        <div class="fbw"><div><div style="font-weight:700">${r.reqNo}</div><div class="tsm tmut">By ${r.requestedByName||'—'} · Needed by ${r.neededBy||r.date}</div></div>
        <span class="bdg ${r.status==='partial'?'bdg-a':'bdg-g'}">${r.status==='partial'?'Partial':'Approved'}</span></div>
        <div style="margin-top:6px">${(r.lines||[]).map(l=>{const issued=issLineIssued(r.id,l.lineNo);const rem=l.qtyApproved-issued;return rem>0?`<div class="tsm" style="padding:2px 0"><span style="font-weight:600">${l.partName}</span> · <span style="color:var(--acc);font-weight:700">${rem} pcs remaining</span></div>`:''}).join('')}</div>
      </div>`).join('')}
    <div id="iss-line-select" style="display:none"></div>
    <div id="iss-tag-section" style="display:none"></div>`}
  </div>`;
}

function issLineIssued(reqId,lineNo){
  return S.routeCards.filter(rc=>rc.requisitionId===reqId&&rc.lineNo===lineNo).reduce((s,rc)=>s+(+rc.issuedQty||0),0);
}

function issSelectReq(id){
  _issReq=S.requisitions.find(r=>r.id===id);
  if(!_issReq)return;
  _issLine=null;_issTags=[];
  // Highlight card in place — do NOT call renderStoreIssue(), it resets _issReq
  document.querySelectorAll('[data-req-id]').forEach(function(el){
    el.style.border=el.dataset.reqId===id?'1.5px solid var(--acc)':'1.5px solid var(--bdr)';
  });
  // Show line selector
  const linesDiv=document.getElementById('iss-line-select');
  if(!linesDiv)return;
  const activeLines=_issReq.lines.filter(l=>{const issued=issLineIssued(_issReq.id,l.lineNo);return l.qtyApproved-issued>0;});
  linesDiv.style.display='block';
  linesDiv.innerHTML=`<div class="slbl" style="margin-top:12px">Select Part Line to Issue</div>`+activeLines.map(l=>{
    const issued=issLineIssued(_issReq.id,l.lineNo);
    const rem=l.qtyApproved-issued;
    return`<div class="card" style="margin-bottom:8px;cursor:pointer;border:1.5px solid ${_issLine&&_issLine.lineNo===l.lineNo?'var(--acc)':'var(--bdr)'}" onclick="issSelectLine(${l.lineNo})">
      <div style="font-weight:700">${l.partName}</div>
      <div class="tsm tmut">${l.partNo}${l.customerName?' · '+l.customerName:''}</div>
      <div style="display:flex;gap:12px;margin-top:4px;font-size:12px">
        <span>Approved: <strong>${l.qtyApproved}</strong></span>
        <span>Issued so far: <strong>${issued}</strong></span>
        <span style="color:var(--acc);font-weight:700">Remaining: ${rem}</span>
      </div>
    </div>`;
  }).join('');
}

function issSelectLine(lineNo){
  if(!_issReq)return;
  _issLine=_issReq.lines.find(l=>l.lineNo===lineNo);
  if(!_issLine)return;
  _issTags=[];
  const issued=issLineIssued(_issReq.id,_issLine.lineNo);
  const remaining=_issLine.qtyApproved-issued;
  // Generate batchCode for this issue session
  const ymd=dateStr().replace(/-/g,'');
  const issCount=S.routeCards.filter(rc=>rc.requisitionId===_issReq.id&&rc.lineNo===_issLine.lineNo).length;
  _issBatchCode=`${_isReq_masterLot()}-${ymd}-${issCount+1}`;
  const tagDiv=document.getElementById('iss-tag-section');
  if(!tagDiv)return;
  tagDiv.style.display='block';
  issRenderTagSection(remaining);
}

function _isReq_masterLot(){
  // Get masterLotCode from the line or from inward
  if(_issLine&&_issLine.masterLotCode)return _issLine.masterLotCode;
  // Fallback: find lot with this part that has stock
  const lots=S.inward.filter(iw=>(iw.parts||[]).some(p=>p.partId===_issLine.partId)||(iw.parts||[]).some(p=>p.partName===_issLine.partName));
  return lots.length?lots[0].masterLotCode:'LOT-UNKNOWN';
}

function issQuickFillTags(remaining){
  if(!isTanmay()||!TEST_MODE){return;}
  // Find all routeCards with status=unlinked from S.routeCards
  // Also check the TEST_ collection records in memory
  const unlinked=S.routeCards.filter(rc=>rc.status==='unlinked'||!rc.status);
  if(!unlinked.length){toast('No unlinked TAGs found in registry');return;}
  let added=0;
  const sessionTotal=_issTags.reduce((s,t)=>s+(+t.qty||0),0);
  let rem=remaining-sessionTotal;
  for(const rc of unlinked){
    if(rem<=0)break;
    if(_issTags.find(t=>t.tagId===rc.tagId))continue;
    const qty=Math.min(rc.currentQty||rc.issuedQty||25,rem);
    _issTags.push({tagId:rc.tagId,qty,issueDate:dateStr()});
    rem-=qty;added++;
  }
  if(!added){
    // No route cards found — use TAG registry to guess
    const cfg=S.routeCards;
    toast('No unlinked route cards found. Type TAG IDs manually.');
    return;
  }
  issRenderTagSection(remaining);
  toast(`⚡ Added ${added} TAG(s) to session`);
}

async function issAddTag(remaining){
  const tagInput=document.getElementById('iss-tag-input');
  const qtyInput=document.getElementById('iss-tag-qty');
  const tagId=(tagInput?.value||'').trim().toUpperCase();
  const qty=parseInt(qtyInput?.value)||0;
  if(!tagId){toast('Enter or scan a TAG number');return}
  if(!tagId.match(/^TAG\d+$/)){toast('Invalid TAG format. Expected TAG001, TAG042, etc.');return}
  if(!qty||qty<1){toast('Enter quantity for this bin');return}
  const sessionTotal=_issTags.reduce((s,t)=>s+(+t.qty||0),0);
  if(sessionTotal+qty>remaining){toast(`Only ${remaining-sessionTotal} pcs remaining to issue`);return}
  // Check duplicate in session
  if(_issTags.find(t=>t.tagId===tagId)){toast(tagId+' already added in this session');return}
  // Check Firestore — tag must not already be active
  try{
    const existing=await db.collection('routeCards').doc(tagId).get();
    if(existing.exists&&existing.data().status!=='unlinked'){toast(tagId+' is already in use ('+existing.data().status+')');return}
  }catch(e){toast('Error checking TAG: '+e.message);return}
  _issTags.push({tagId,qty,issueDate:document.getElementById('iss-tag-date')?.value||dateStr()});
  if(tagInput)tagInput.value='';
  if(qtyInput)qtyInput.value='';
  issRenderTagSection(remaining);
}

async function issSubmitSession(){
  if(!_issReq||!_issLine||!_issTags.length){toast('Nothing to submit');return}
  const btn=document.querySelector('#iss-tag-section .btn-p:last-child');
  if(btn){btn.disabled=true;btn.textContent='Submitting...';}
  try{
    const batch=db.batch();
    const inwardRec=S.inward.find(iw=>iw.masterLotCode===_isReq_masterLot());
    _issTags.forEach(t=>{
      const ref=db.collection('routeCards').doc(t.tagId);
      batch.set(ref,{
        tagId:t.tagId,
        batchCode:_issBatchCode,
        status:'store_issued',
        cardType:'normal',
        // Lineage
        masterLotCode:_isReq_masterLot(),
        inwardId:inwardRec?inwardRec.id:'',
        parentTagId:null,
        rootBatchCode:_issBatchCode,
        // Part info
        partId:_issLine.partId,
        partNo:_issLine.partNo,
        partName:_issLine.partName,
        customerId:_issLine.customerId||'',
        customerName:_issLine.customerName||'',
        // Quantities
        issuedQty:t.qty,
        currentQty:t.qty,
        // Stage
        currentStage:'soft',
        currentOpId:null,
        opHistory:[],
        // HT
        heatCode:null,
        htChargeId:null,
        // QC
        qty_oem:0,qty_spares:0,qty_market:0,
        qtyRejected:0,qtyRework:0,reworkTagId:null,
        // Dispatch
        dispatchedQty:0,
        // Rework
        isRework:false,reworkSeq:0,reworkOp:null,
        // Requisition link
        requisitionId:_issReq.id,
        reqNo:_issReq.reqNo,
        lineNo:_issLine.lineNo,
        // Audit
        issuedBy:S.sess.userId,
        issuedByName:S.sess.name,
        issueDate:t.issueDate,
        issuedAt:nowTS(),
        updatedAt:nowTS()
      });
    });
    // Update requisition qtyIssued and status
    const totalNewlyIssued=_issTags.reduce((s,t)=>s+(+t.qty||0),0);
    const updatedLines=_issReq.lines.map(l=>{
      if(l.lineNo!==_issLine.lineNo)return l;
      const alreadyIssued=issLineIssued(_issReq.id,l.lineNo);
      return{...l,qtyIssued:(alreadyIssued+totalNewlyIssued)};
    });
    const allFulfilled=updatedLines.every(l=>l.qtyIssued>=l.qtyApproved);
    const rqRef=db.collection('requisitions').doc(_issReq.id);
    batch.update(rqRef,{lines:updatedLines,status:allFulfilled?'fulfilled':'partial',updatedAt:nowTS()});
    await batch.commit();
    const tagList=_issTags.map(t=>t.tagId).join(', ');
    toast(`✅ Issued! ${_issTags.length} TAG${_issTags.length>1?'s':''}: ${tagList}`);
    _issReq=null;_issLine=null;_issTags=[];_issBatchCode='';
    renderStoreIssue();
  }catch(e){
    toast('Error: '+e.message);
    const btn=document.querySelector('#iss-tag-section .btn-p:last-child');
    if(btn){btn.disabled=false;btn.textContent='Issue TAGs to WIP';}
  }
}

function renderStoreStock(){
  document.getElementById('s-store-stock').innerHTML=`<div class="hdr"><button class="hdr-back" onclick="goBack()">←</button><div class="hdr-info"><div class="hdr-title">Stock Balance</div></div></div>
  <div class="pad" id="stock-body"><div class="tsm tmut" style="padding:20px;text-align:center">Calculating stock...</div></div>`;
  renderStockBody();
}
function renderStockBody(){
  const lots={};
  S.inward.forEach(r=>{
    if(!r.masterLotCode)return;
    if(!lots[r.masterLotCode])lots[r.masterLotCode]={rec:r,issued:0};
  });
  // Use routeCards for issued qty (new), fall back to batches (legacy)
  S.routeCards.forEach(rc=>{
    if(!rc.masterLotCode)return;
    if(lots[rc.masterLotCode])lots[rc.masterLotCode].issued+=(+rc.issuedQty||0);
  });
  S.batches.forEach(b=>{
    if(!b.masterLotCode)return;
    // Only count legacy batches not already in routeCards
    if(lots[b.masterLotCode]&&!S.routeCards.find(rc=>rc.masterLotCode===b.masterLotCode))
      lots[b.masterLotCode].issued+=(+b.issueQty||0);
  });
  const w=document.getElementById('stock-body');if(!w)return;
  const entries=Object.values(lots);
  if(!entries.length){w.innerHTML=`<div class="empty"><div class="empty-ic">📦</div><h3>No stock yet</h3><p>Add inward receipts to track stock.</p></div>`;return}
  const bySup={};
  entries.forEach(({rec,issued})=>{
    const sn=rec.supplierName||rec.supplier||'Unknown';
    if(!bySup[sn])bySup[sn]=[];
    const total=rec.parts&&rec.parts.length?rec.parts.reduce((s,p)=>s+(+p.qty||0),0):(+rec.qty||0);
    bySup[sn].push({rec,bal:total-issued,issued,total});
  });
  let html='';
  Object.entries(bySup).forEach(([sn,items])=>{
    html+=`<div class="slbl">${sn}</div>`;
    items.forEach(({rec,bal,issued,total})=>{
      const pct=total>0?Math.round(bal/total*100):0;
      html+=`<div class="card" style="margin-bottom:8px;padding:12px 14px">
        <div class="fbw" style="margin-bottom:4px">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700">${rec.parts&&rec.parts.length?rec.parts.map(p=>p.partName).join(', '):(rec.materialType||'—')}</div>
            <div style="font-size:11px;color:var(--mut);margin-top:2px">${rec.date}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;margin-left:8px">
            <div style="font-weight:700;color:${bal>0?'var(--ok)':'var(--er)'};font-size:15px">${bal} pcs</div>
            <div style="font-size:11px;color:var(--mut)">${issued} issued</div>
          </div>
        </div>
        <div class="lot-badge" style="margin-bottom:8px;font-size:11px">🏷 ${rec.masterLotCode}</div>
        <div class="prog"><div class="pf ${pct>50?'pf-g':pct>20?'pf-a':'pf-r'}" style="width:${pct}%"></div></div>
        <div class="tsm tmut" style="margin-top:4px">Received: ${total} pcs · ${pct}% remaining</div>
      </div>`;
    });
  });
  w.innerHTML=html;
}

function previewLotCode(existingRec){
  const sel=document.getElementById('iw-sup');
  if(!sel)return;
  const supplierId=sel.value;
  if(!supplierId){document.getElementById('iw-lot-preview').style.display='none';return}
  const sup=S.suppliers.find(s=>s.id===supplierId);
  if(!sup){return}
  // Count existing inward for this supplier (exclude current record if editing)
  const existing=S.inward.filter(r=>r.supplierId===supplierId&&(!existingRec||r.id!==existingRec.id)).length;
  const dlvNum=String(existingRec?existingRec.deliveryNum||(existing+1):existing+1).padStart(3,'0');
  const dateVal=document.getElementById('iw-d')?.value||dateStr();
  const ymd=dateVal.replace(/-/g,'');
  const lotCode=existingRec&&existingRec.masterLotCode?existingRec.masterLotCode:`${ymd}-${sup.code}-DLV${dlvNum}`;
  const preview=document.getElementById('iw-lot-preview');
  const val=document.getElementById('iw-lot-val');
  if(preview)preview.style.display='block';
  if(val)val.textContent=lotCode;
}

async function saveInw(editId){
  const supplierId=document.getElementById('iw-sup').value;
  const date=document.getElementById('iw-d').value;
  if(!supplierId){toast('Supplier required');return}
  if(!_inwParts.length){toast('Add at least one part');return}
  const badParts=_inwParts.filter(p=>!p.qty||p.qty<1);
  if(badParts.length){toast('All parts must have a valid quantity');return}
  const sup=S.suppliers.find(s=>s.id===supplierId);
  if(!sup){toast('Invalid supplier');return}
  // Totals for backward compat
  const totalPcs=_inwParts.reduce((s,p)=>s+(+p.qty||0),0);
  const matSummary=_inwParts.map(p=>p.partName).join(', ');
  let masterLotCode,deliveryNum;
  if(editId){
    const existing=S.inward.find(r=>r.id===editId);
    masterLotCode=existing?.masterLotCode||document.getElementById('iw-lot-val')?.textContent||'';
    deliveryNum=existing?.deliveryNum||0;
  }else{
    const prevCount=S.inward.filter(r=>r.supplierId===supplierId).length;
    deliveryNum=prevCount+1;
    const ymd=date.replace(/-/g,'');
    masterLotCode=`${ymd}-${sup.code}-DLV${String(deliveryNum).padStart(3,'0')}`;
  }
  const d={
    date,supplierId,supplierCode:sup.code,supplierName:sup.name,
    parts:_inwParts,
    // backward-compat fields used by calcLotBalance and issue flow
    qty:totalPcs,unit:'pcs',
    materialType:matSummary,
    notes:document.getElementById('iw-notes').value.trim(),
    masterLotCode,deliveryNum
  };
  try{
    if(editId){await db.collection('inward').doc(editId).update(d);}
    else{await db.collection('inward').add({...d,createdBy:S.sess.userId,createdAt:nowTS()});}
    closeModal();toast(editId?'Receipt updated ✓':'Inward receipt saved ✓');
    renderInwardList();
  }catch(e){toast('Error: '+e.message)}
}

  if(!isTanmay())return;
  if(!confirm('Delete this receipt?'))return;
  try{await db.collection('inward').doc(id).delete();toast('Deleted');renderInwardList();}
  catch(e){toast('Error: '+e.message)}
}

async function init(){
  // Use same key as sSess/gSess ('imf_s')
  let sess=gSess();
  if(sess&&sess.userId){
    S.sess=sess;
    await loadAll();
    renderApp();
    renderHome();
  }else{
    // Load users first so we know whether to show setup or login
    try{
      const sn=await db.collection('users').get();
      S.users=sn.docs.map(d=>({id:d.id,...d.data()}));
    }catch(e){console.error('Failed to load users',e);}
    showLogin();
  }
}

async function loadAll(){
  await Promise.all([
    loadMasters(),
    db.collection('plans').orderBy('date','desc').limit(200).get().then(sn=>{S.plans=sn.docs.map(d=>({id:d.id,...d.data()}));}),
    db.collection('actuals').orderBy('date','desc').limit(200).get().then(sn=>{S.actuals=sn.docs.map(d=>({id:d.id,...d.data()}));}),
    db.collection('inward').orderBy('date','desc').limit(500).get().then(sn=>{S.inward=sn.docs.map(d=>({id:d.id,...d.data()}));}),
    db.collection('batches').orderBy('issueDate','desc').limit(500).get().then(sn=>{S.batches=sn.docs.map(d=>({id:d.id,...d.data()}));}),
  ]);
  setupListeners();
}

function doLogin(){
  const e=document.getElementById('li-e').value.trim();
  const p=document.getElementById('li-p').value;
  const err=document.getElementById('li-err');
  if(!e||!p){if(err){err.textContent='Email and password required';err.style.display='block';}return}
  const btn=document.querySelector('#s-login .btn-p');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>Signing in...';}
  firebase.auth().signInWithEmailAndPassword(e,p).then(async cred=>{
    const uid=cred.user.uid;
    const snap=await db.collection('users').where('email','==',e).limit(1).get();
    let user=null;
    if(!snap.empty){const d=snap.docs[0];user={id:d.id,...d.data()};}
    else{user={id:uid,name:e.split('@')[0],role:'operator',email:e,permissions:{plan:'full',actual:'full',reports:'full'}};}
    const sess={userId:user.id,name:user.name,role:user.role,email:user.email,permissions:user.permissions||{plan:'full',actual:'full',reports:'full'}};
    S.sess=sess;
    sSess(sess);
    await loadAll();renderApp();renderHome();
  }).catch(err2=>{
    if(err){err.textContent=err2.code==='auth/invalid-credential'?'Invalid email or password':err2.message;err.style.display='block';}
    if(btn){btn.disabled=false;btn.textContent='Sign In';}
  });
}

function spareRow(sp,i,bdId){
  return`<div style="display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:6px;align-items:center;margin-bottom:6px" id="spare-row-${i}">
    <input type="text" placeholder="Item name/description" value="${sp.name||''}" oninput="updateSpare('${bdId}',${i},'name',this.value)">
    <input type="number" placeholder="Qty" min="1" value="${sp.qty||''}" oninput="updateSpare('${bdId}',${i},'qty',this.value)">
    <input type="number" placeholder="₹/unit" min="0" value="${sp.unitCost||''}" oninput="updateSpare('${bdId}',${i},'unitCost',this.value)">
    <button onclick="removeSpare('${bdId}',${i})" style="width:32px;height:32px;border-radius:8px;border:none;background:var(--erbg);color:var(--er);font-size:16px;cursor:pointer">✕</button>
  </div>`;
}
async function addSpareRow(bdId){
  const b=S.breakdowns.find(x=>x.id===bdId);if(!b)return;
  const spares=[...(b.spares||[]),{name:'',qty:'',unitCost:'',unit:'pcs'}];
  await db.collection('breakdowns').doc(bdId).update({spares,sparesApproved:false,updatedAt:nowTS()});
  // Submit spares request to admin
  await db.collection('sparesRequests').add({breakdownId:bdId,machineId:b.machineId,machineName:b.machineName,spares,status:'pending',requestedBy:S.sess.userId,requestedByName:S.sess.name,createdAt:nowTS()});
  renderBreakdownDetail(bdId);
}
async function updateSpare(bdId,idx,field,val){
  const b=S.breakdowns.find(x=>x.id===bdId);if(!b)return;
  const spares=[...(b.spares||[])];if(!spares[idx])return;
  spares[idx]={...spares[idx],[field]:val};
  await db.collection('breakdowns').doc(bdId).update({spares,updatedAt:nowTS()});
}
async function removeSpare(bdId,idx){
  const b=S.breakdowns.find(x=>x.id===bdId);if(!b)return;
  const spares=[...(b.spares||[])];spares.splice(idx,1);
  await db.collection('breakdowns').doc(bdId).update({spares,updatedAt:nowTS()});
  renderBreakdownDetail(bdId);
}
async function acknowledgeBreakdown(id){
  const fault=document.getElementById('bd-fault')?.value;
  const techId=document.getElementById('bd-tech')?.value;
  if(!fault){toast('Select fault category');return}
  const tech=S.users.find(u=>u.id===techId);
  const b=S.breakdowns.find(x=>x.id===id);if(!b)return;
  try{
    await db.collection('breakdowns').doc(id).update({status:'acknowledged',faultCategory:fault,acknowledgedBy:techId||S.sess.userId,acknowledgedByName:tech?.name||S.sess.name,acknowledgedAt:nowTS(),updatedAt:nowTS()});
    await db.collection('machineStatus').doc(b.machineId).set({status:'breakdown',activeBreakdownId:id,updatedAt:nowTS()},{merge:true});
    toast('Breakdown acknowledged');
    renderBreakdownDetail(id);
  }catch(e){toast('Error: '+e.message)}
}
async function closeBreakdown(id,machineId,startTime,startDate){
  const upTime=document.getElementById('bd-uptime')?.value;
  const upDate=document.getElementById('bd-update')?.value||startDate;
  const fix=document.getElementById('bd-fix')?.value.trim();
  const closedById=document.getElementById('bd-closetech')?.value;
  if(!upTime){toast('Enter up time');return}
  if(!fix){toast('Enter fix description');return}
  // Calculate downtime
  const start=new Date(`${startDate}T${startTime}`);
  const end=new Date(`${upDate}T${upTime}`);
  const mins=Math.max(0,Math.round((end-start)/60000));
  const closedBy=S.users.find(u=>u.id===closedById);
  try{
    await db.collection('breakdowns').doc(id).update({status:'resolved',upTime,upDate,upTimestamp:nowTS(),fixDescription:fix,closedBy:closedById||S.sess.userId,closedByName:closedBy?.name||S.sess.name,totalDowntimeMins:mins,updatedAt:nowTS()});
    await db.collection('machineStatus').doc(machineId).set({status:'operational',activeBreakdownId:null,updatedAt:nowTS()},{merge:true});
    toast(`Breakdown closed — ${mins} mins downtime logged ✓`);
    go('maint-breakdowns','maint-breakdown-detail');renderBreakdowns();
  }catch(e){toast('Error: '+e.message)}
}

async function rejectSpares(id){

function renderPMHub(){

  <div class="pad">
    ${due.length?`<div class="slbl" style="color:var(--er)">Due / Overdue (${due.length})</div>`+due.map(ps=>pmCard(ps,true)).join(''):'<div class="card" style="text-align:center;padding:16px;margin-bottom:12px"><div style="font-size:24px">✅</div><div class="tsm" style="margin-top:4px">No overdue PM tasks</div></div>'}
    ${upcoming.length?`<div class="slbl" style="margin-top:8px">Upcoming</div>`+upcoming.slice(0,10).map(ps=>pmCard(ps,false)).join(''):''}
    <div class="slbl" style="margin-top:16px">Recent PM Logs</div>
    ${S.pmLogs.slice(0,10).map(l=>`<div class="card" style="margin-bottom:8px">
      <div class="fbw"><div><div style="font-weight:600">${l.machineName||'—'}</div><div class="tsm tmut">${l.taskName} · ${l.completedDate}</div></div><span class="bdg bdg-g">Done</span></div>
      <div class="tsm tmut" style="margin-top:4px">By ${l.techName||'—'}${l.remarks?' · '+l.remarks:''}</div>
    </div>`).join('')||'<div class="tsm tmut" style="padding:8px">No PM logs yet</div>'}
  </div>`;
}
function pmCard(ps,isDue){
  const today=dateStr();
  const daysStr=ps.nextDue?Math.round((new Date(ps.nextDue)-new Date(today))/(86400000)):'—';
  const overdue=typeof daysStr==='number'&&daysStr<0;
  return`<div class="card" style="margin-bottom:8px;border:.5px solid ${isDue?'var(--er)':'var(--bdr)'}">
    <div class="fbw" style="margin-bottom:6px">
      <div><div style="font-weight:700">${ps.machineName||'—'}</div><div class="tsm tmut">${ps.taskName} · ${ps.frequency}</div></div>
      <div style="text-align:right"><div style="font-size:12px;font-weight:700;color:${overdue?'var(--er)':'var(--wa)'}">${overdue?Math.abs(daysStr)+' days overdue':daysStr+' days'}</div><div class="tsm tmut">Due: ${ps.nextDue||'—'}</div></div>
    </div>
    ${isDue&&(S.sess.role==='maintenance'||isAdmin())?`<button class="btn btn-p btn-sm" style="width:100%" onclick="logPM('${ps.id}')">✅ Log PM Completion</button>`:''}
  </div>`;
}
async function logPM(psId){
  const ps=S.pmSchedules.find(x=>x.id===psId);if(!ps)return;
  openModal(`<div class="mtit">Log PM — ${ps.machineName}</div>
  <div class="f"><label>Task</label><input type="text" value="${ps.taskName}" disabled></div>
  <div class="f"><label>Completed By</label><select id="pm-tech"><option value="">— Select —</option>${S.users.filter(u=>u.role==='maintenance'||u.role==='admin').map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select></div>
  <div class="f"><label>Date</label><input id="pm-date" type="date" value="${dateStr()}"></div>
  <div class="f"><label>Remarks</label><input id="pm-rmk" type="text" placeholder="Optional observations..."></div>
  <button class="btn btn-p mt8" style="width:100%" onclick="submitPMLog('${psId}')">Submit PM Log</button>
  <button class="btn btn-s mt8" onclick="closeModal()">Cancel</button>`);
}
async function submitPMLog(psId){
  const ps=S.pmSchedules.find(x=>x.id===psId);if(!ps)return;
  const techId=document.getElementById('pm-tech')?.value;
  const date=document.getElementById('pm-date')?.value||dateStr();
  const rmk=document.getElementById('pm-rmk')?.value.trim()||'';
  if(!techId){toast('Select technician');return}
  const tech=S.users.find(u=>u.id===techId);
  try{
    await db.collection('pmLogs').add({scheduleId:psId,machineId:ps.machineId,machineName:ps.machineName,taskName:ps.taskName,frequency:ps.frequency,completedDate:date,techId,techName:tech?.name||'',remarks:rmk,completedAt:nowTS()});
    // Calculate next due date
    const nextDue=calcNextDue(date,ps.frequency,ps.frequencyDays);
    await db.collection('pmSchedules').doc(psId).update({lastCompleted:date,nextDue,updatedAt:nowTS()});
    closeModal();toast('PM logged ✓');
  }catch(e){toast('Error: '+e.message)}
}
function calcNextDue(fromDate,freq,days){
  const d=new Date(fromDate);
  const n=parseInt(days)||{daily:1,weekly:7,monthly:30,quarterly:90,yearly:365}[freq]||30;
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}

function renderMaintHealth(){
  document.getElementById('s-maint-health').innerHTML=`<div class="hdr"><button class="hdr-back" onclick="goBack()">←</button><div class="hdr-info"><div class="hdr-title">Asset Health</div><div class="hdr-sub">MTBF & MTTR metrics</div></div></div>
  <div class="pad">
    ${S.machines.filter(m=>m.active!==false).map(m=>{
      const mBreakdowns=S.breakdowns.filter(b=>b.machineId===m.id&&b.status==='resolved');
      if(!mBreakdowns.length)return`<div class="card" style="margin-bottom:8px"><div class="fbw"><span style="font-weight:600">${m.name}</span><span class="tsm tmut">No breakdown history</span></div></div>`;
      // MTTR = avg downtime mins
      const mttr=Math.round(mBreakdowns.reduce((s,b)=>s+(+b.totalDowntimeMins||0),0)/mBreakdowns.length);
      // MTBF — avg days between consecutive failures
      let mtbf='N/A';
      if(mBreakdowns.length>=2){
        const sorted=mBreakdowns.slice().sort((a,b)=>a.date>b.date?1:-1);
        let totalDays=0;
        for(let i=1;i<sorted.length;i++){totalDays+=Math.max(0,Math.round((new Date(sorted[i].date)-new Date(sorted[i-1].date))/(86400000)));}
        mtbf=Math.round(totalDays/(sorted.length-1))+' days';
      }
      const faultCounts={};
      mBreakdowns.forEach(b=>{if(b.faultCategory)faultCounts[b.faultCategory]=(faultCounts[b.faultCategory]||0)+1;});
      const topFault=Object.entries(faultCounts).sort((a,b)=>b[1]-a[1])[0];
      return`<div class="card" style="margin-bottom:10px">
        <div style="font-weight:700;margin-bottom:8px">${m.name} <span class="tsm tmut">${m.id_code||''}</span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">
          <div class="sc"><div class="sl">Breakdowns</div><div class="sv">${mBreakdowns.length}</div></div>
          <div class="sc"><div class="sl">MTBF</div><div class="sv" style="font-size:13px">${mtbf}</div></div>
          <div class="sc"><div class="sl">MTTR (avg)</div><div class="sv" style="font-size:13px">${mttr} min</div></div>
        </div>
        ${topFault?`<div class="tsm tmut">Top fault: <strong>${topFault[0]}</strong> (${topFault[1]}x)</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

// ── Production downtime prefill from maintenance ──
function getMaintDowntimeForMachine(machineId,date){
  // Returns closed breakdown downtime for this machine today — for prefill in production
  const closed=S.breakdowns.filter(b=>b.machineId===machineId&&b.date===date&&b.status==='resolved');
  if(!closed.length)return null;
  const total=closed.reduce((s,b)=>s+(+b.totalDowntimeMins||0),0);
  const reasons=closed.map(b=>b.faultCategory||'Breakdown').join(', ');
  return{mins:total,reasons,count:closed.length};
}

async function autoApproveAllSetups(){
  if(!isTanmay()||!TEST_MODE){toast('TEST helper — Tanmay only');return;}

  let count=0;

async function qcFetchTag(){
  const tagId=(document.getElementById('qc-tag-input')?.value||'').trim().toUpperCase();
  if(!tagId){toast('Enter a TAG number');return}
  if(!tagId.match(/^TAG\d+$/)){toast('Invalid TAG format');return}
  const infoDiv=document.getElementById('qc-card-info');
  const formDiv=document.getElementById('qc-disposition-form');
  infoDiv.innerHTML=`<div class="tsm tmut" style="padding:12px;text-align:center">Loading...</div>`;
  formDiv.style.display='none';
  try{
    const doc=await db.collection('routeCards').doc(tagId).get();
    if(!doc.exists){infoDiv.innerHTML=`<div class="card" style="border:1.5px solid var(--er)"><div style="color:var(--er);font-weight:600">❌ TAG ${tagId} not found</div></div>`;return}
    const card={id:doc.id,...doc.data()};
    // Validate: must be qc_pending status
    if(card.status!=='qc_pending'&&card.status!=='hard_wip'&&card.status!=='hard_done'){
      infoDiv.innerHTML=`<div class="card" style="border:1.5px solid var(--er)">
        <div style="color:var(--er);font-weight:600">❌ Cannot inspect this TAG</div>
        <div class="tsm tmut" style="margin-top:4px">Status: <strong>${card.status}</strong></div>
        <div class="tsm tmut">TAG must complete final hard machining operation before QC.</div>
      </div>`;return
    }
    // Validate: final hard op must be in opHistory
    const hardOps=S.partOps.filter(po=>po.partId===card.partId&&po.stage==='hard').sort((a,b)=>(b.seqNo||0)-(a.seqNo||0));
    const finalOpId=hardOps.length?hardOps[0].opId:null;
    if(finalOpId){
      const completed=(card.opHistory||[]).some(h=>h.opId===finalOpId&&h.stage==='hard');
      if(!completed){
        const finalOpName=S.operations.find(o=>o.id===finalOpId)?.name||'final operation';
        infoDiv.innerHTML=`<div class="card" style="border:1.5px solid var(--er)">
          <div style="color:var(--er);font-weight:600">❌ Final operation not completed</div>
          <div class="tsm tmut" style="margin-top:4px">Required: <strong>${finalOpName}</strong> (last hard stage op) must be logged before QC.</div>
        </div>`;return
      }
    }
    _qcCard=card;_qcTagId=tagId;
    // Show card info
    infoDiv.innerHTML=`<div class="card" style="border:1.5px solid var(--ok);margin-top:12px">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--ok)">✅ TAG Valid — Ready for Inspection</div>

      <div class="rrow" style="padding:3px 0"><span class="tsm tmut">Part</span><span class="tsm" style="font-weight:600">${card.partName}</span></div>
      <div class="rrow" style="padding:3px 0"><span class="tsm tmut">Part No.</span><span class="tsm" style="font-family:monospace">${card.partNo}</span></div>
      <div class="rrow" style="padding:3px 0"><span class="tsm tmut">Customer</span><span class="tsm">${card.customerName||'—'}</span></div>
      <div class="rrow" style="padding:3px 0"><span class="tsm tmut">Batch Code</span><span class="tsm" style="font-family:monospace">${card.batchCode||'—'}</span></div>
      ${card.heatCode?`<div class="rrow" style="padding:3px 0"><span class="tsm tmut">Heat Code</span><span class="tsm" style="font-family:monospace;color:var(--ok)">🔥 ${card.heatCode}</span></div>`:''}

    </div>`;
    // Render disposition form
    qcRenderDispositionForm(card);
    formDiv.style.display='block';
  }catch(e){infoDiv.innerHTML=`<div class="card" style="border:1.5px solid var(--er)"><div style="color:var(--er)">Error: ${e.message}</div></div>`;}
}

  // Wire rework tag section visibility
  document.getElementById('qc-rework-qty').addEventListener('input',function(){
    const v=parseInt(this.value)||0;
    document.getElementById('qc-rework-tag-section').style.display=v>0?'block':'none';
  });
  // Auto-fill OK qty
  qcUpdateOKQty(card.currentQty);
}

function qcUpdateOKQty(total){
  const scrap=parseInt(document.getElementById('qc-scrap-qty')?.value)||0;
  const rework=parseInt(document.getElementById('qc-rework-qty')?.value)||0;
  const ok=Math.max(0,total-scrap-rework);
  const el=document.getElementById('qc-ok-qty');if(el)el.textContent=ok;
  const disp=document.getElementById('qc-ok-display');
  if(disp){
    const over=scrap+rework>total;
    disp.style.borderColor=over?'var(--er)':'var(--ok)';
    disp.style.background=over?'var(--erbg)':'var(--okbg)';
    if(el)el.style.color=over?'var(--er)':'var(--ok)';
  }
  // Reset stream split
  ['qc-ok-oem','qc-ok-spares','qc-ok-market'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=0;});
  document.getElementById('qc-ok-oem').value=ok;
  qcCheckOKSplit(total);
}

function qcCheckOKSplit(total){
  const scrap=parseInt(document.getElementById('qc-scrap-qty')?.value)||0;
  const rework=parseInt(document.getElementById('qc-rework-qty')?.value)||0;
  const ok=Math.max(0,total-scrap-rework);
  const oem=parseInt(document.getElementById('qc-ok-oem')?.value)||0;
  const spares=parseInt(document.getElementById('qc-ok-spares')?.value)||0;
  const market=parseInt(document.getElementById('qc-ok-market')?.value)||0;
  const errEl=document.getElementById('qc-ok-err');
  if(oem+spares+market!==ok){
    if(errEl){errEl.style.display='block';errEl.textContent=`Stream total (${oem+spares+market}) must equal OK qty (${ok})`;}
  }else{if(errEl)errEl.style.display='none';}
}

async function submitQCDisposition(){
  if(!_qcCard){toast('No TAG loaded');return}
  const inspectorId=document.getElementById('qc-inspector')?.value;
  if(!inspectorId){toast('Select an inspector');return}
  const inspector=S.users.find(u=>u.id===inspectorId);
  const date=document.getElementById('qc-date')?.value||dateStr();
  const scrapQty=parseInt(document.getElementById('qc-scrap-qty')?.value)||0;
  const scrapReason=document.getElementById('qc-scrap-reason')?.value||'';
  const reworkQty=parseInt(document.getElementById('qc-rework-qty')?.value)||0;
  const reworkOpId=document.getElementById('qc-rework-op')?.value||'';
  const reworkTag=(document.getElementById('qc-rework-tag')?.value||'').trim().toUpperCase();
  const okOEM=parseInt(document.getElementById('qc-ok-oem')?.value)||0;
  const okSpares=parseInt(document.getElementById('qc-ok-spares')?.value)||0;
  const okMarket=parseInt(document.getElementById('qc-ok-market')?.value)||0;
  const total=_qcCard.currentQty;
  const okQty=okOEM+okSpares+okMarket;
  // Validate totals
  if(scrapQty+reworkQty+okQty!==total){toast(`Total mismatch: ${scrapQty}+${reworkQty}+${okQty}=${scrapQty+reworkQty+okQty} ≠ ${total} pcs`);return}
  if(scrapQty>0&&!scrapReason){toast('Select a defect reason for rejected qty');return}
  if(reworkQty>0&&!reworkOpId){toast('Select rework operation');return}
  if(reworkQty>0&&!reworkTag){toast('Scan or enter a new TAG for rework batch');return}
  if(reworkQty>0&&reworkTag===_qcTagId){toast('Rework TAG must be different from original TAG');return}
  if(reworkQty>0&&!reworkTag.match(/^TAG\d+$/)){toast('Invalid rework TAG format');return}
  const btn=document.querySelector('#qc-disposition-form .btn-p');
  if(btn){btn.disabled=true;btn.textContent='Submitting...';}
  try{
    const batch=db.batch();
    // 1. Update original route card
    const cardUpdates={
      status:'qc_cleared',
      qty_oem:okOEM,qty_spares:okSpares,qty_market:okMarket,
      qtyRejected:scrapQty,qtyRework:reworkQty,
      currentQty:okQty,
      updatedAt:nowTS()
    };
    if(reworkQty>0)cardUpdates.reworkTagId=reworkTag;
    batch.update(db.collection('routeCards').doc(_qcTagId),cardUpdates);
    // 2. Rework card — inherit genealogy
    if(reworkQty>0){
      const reworkOpName=S.operations.find(o=>o.id===reworkOpId)?.name||'';
      const reworkSeq=(_qcCard.reworkSeq||0)+1;
      batch.set(db.collection('routeCards').doc(reworkTag),{
        tagId:reworkTag,
        batchCode:_qcCard.batchCode+'-RWK'+reworkSeq,
        status:'hard_wip',
        cardType:'rework',
        isRework:true,
        reworkSeq,
        reworkOp:reworkOpId,
        reworkOpName:reworkOpName,
        parentTagId:_qcTagId,
        rootBatchCode:_qcCard.rootBatchCode||_qcCard.batchCode,
        masterLotCode:_qcCard.masterLotCode||'',
        inwardId:_qcCard.inwardId||'',
        partId:_qcCard.partId,partNo:_qcCard.partNo,partName:_qcCard.partName,
        customerId:_qcCard.customerId||'',customerName:_qcCard.customerName||'',
        issuedQty:reworkQty,currentQty:reworkQty,
        currentStage:'hard',currentOpId:reworkOpId,
        opHistory:[..._qcCard.opHistory||[]],
        heatCode:_qcCard.heatCode||null,htChargeId:_qcCard.htChargeId||null,
        qty_oem:0,qty_spares:0,qty_market:0,qtyRejected:0,qtyRework:0,reworkTagId:null,
        dispatchedQty:0,
        issuedBy:S.sess.userId,issuedByName:S.sess.name,
        issueDate:date,issuedAt:nowTS(),updatedAt:nowTS()
      });
    }
    // 3. Scrap ledger entry
    if(scrapQty>0){
      batch.set(db.collection('scrapLedger').doc(),{
        tagId:_qcTagId,batchCode:_qcCard.batchCode||'',heatCode:_qcCard.heatCode||'',
        masterLotCode:_qcCard.masterLotCode||'',
        partId:_qcCard.partId,partNo:_qcCard.partNo,partName:_qcCard.partName,
        customerName:_qcCard.customerName||'',
        qtyRejected:scrapQty,defectReason:scrapReason,
        inspectorId,inspectorName:inspector?.name||'',
        date,createdAt:nowTS()
      });
    }
    // 4. QC inspection record
    const qcRef=db.collection('qcInspections').doc();
    batch.set(qcRef,{
      tagId:_qcTagId,batchCode:_qcCard.batchCode||'',heatCode:_qcCard.heatCode||'',
      masterLotCode:_qcCard.masterLotCode||'',
      partId:_qcCard.partId,partNo:_qcCard.partNo,partName:_qcCard.partName,
      customerName:_qcCard.customerName||'',
      totalQty:total,scrapQty,reworkQty,okQty,
      okOEM,okSpares,okMarket,
      scrapReason:scrapReason||'',
      reworkOpId:reworkOpId||'',reworkTag:reworkTag||'',
      inspectorId,inspectorName:inspector?.name||'',
      date,createdAt:nowTS()
    });
    await batch.commit();
    toast(`✅ QC done — ${okQty} OK · ${scrapQty} scrapped · ${reworkQty} rework`);
    _qcCard=null;_qcTagId='';
    renderQCInspect();
  }catch(e){
    toast('Error: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='Submit QC Disposition';}
  }
}

async function htLookupTag(){
  const tagId=(document.getElementById('htc-tag-input')?.value||'').trim().toUpperCase();
  if(!tagId){toast('Enter a TAG number');return}
  if(!tagId.match(/^TAG\d+$/)){toast('Invalid TAG format — expected TAG001, TAG042 etc.');return}

  if(!S._htComps)S._htComps=[];
  if(S._htComps.find(c=>c.tagId===tagId)){toast(tagId+' already added to this charge');return}
  try{
    const doc=await db.collection('routeCards').doc(tagId).get();
    if(!doc.exists){toast(tagId+' not found — has it been issued from Store?');return}
    const card=doc.data();
    // Accept soft_wip or store_issued TAGs
    const valid=['store_issued','soft_wip','soft_done'];
    if(!valid.includes(card.status)){
      toast(tagId+' status is "'+card.status+'" — must be soft_wip or store_issued to enter HT');return;
    }
    // Show info
    const info=document.getElementById('htc-tag-info');
    if(info){
      info.style.display='block';
      info.innerHTML='<div style="font-weight:700;font-family:monospace;color:var(--acc)">'+tagId+'</div>'
        +'<div style="font-weight:600">'+card.partName+'</div>'
        +'<div class="tsm tmut">'+card.partNo+' · Batch: '+card.batchCode+'</div>'
        +'<div class="tsm tmut">Qty on card: <strong>'+card.currentQty+'</strong></div>';
    }
    // Pre-fill qty
    const qtyEl=document.getElementById('htc-qty');
    if(qtyEl&&!qtyEl.value)qtyEl.value=card.currentQty||'';
    // Store card data for confirm
    window._htcCardData={
      tagId,partId:card.partId,partNo:card.partNo,partName:card.partName,
      batchCode:card.batchCode,masterLotCode:card.masterLotCode,
      currentQty:card.currentQty,customerName:card.customerName||''
    };
    const btn=document.getElementById('htc-confirm-btn');
    if(btn)btn.style.display='block';
    htStopTagScan();
  }catch(e){toast('Error fetching TAG: '+e.message);}
}

  }
  try{
    await db.collection('htCharges').doc(id).update({tempReadings:readings});
    toast('✅ 7 temp readings added');
  }catch(e){toast('Error: '+e.message);return;}
  // Quenching
  const fields={
    'ht-unload-time':'16:00','ht-qstart':'16:05',
    'ht-q-oil-before':'60','ht-q-oil-after':'75',
    'ht-q-wash-temp':'62','ht-q-wash-ph':'10.5',
    'ht-cool-start':'16:20'
  };
  Object.entries(fields).forEach(([id2,val])=>{const el=document.getElementById(id2);if(el)el.value=val;});
  for(let i=0;i<7;i++){const el=document.getElementById('ht-sqhrc-'+i);if(el)el.value=58+Math.round(Math.random()*3);}
  await htSaveQuenching(id);
  // Tempering
  const tmpFields={'ht-tmp-temp':'180','ht-tmp-load':'17:00','ht-tmp-atnd':'17:30','ht-tmp-unload':'19:00'};
  Object.entries(tmpFields).forEach(([id2,val])=>{const el=document.getElementById(id2);if(el)el.value=val;});
  await htSaveTempering(id);
  // Inspection
  for(let i=0;i<4;i++){const el=document.getElementById('ht-insp-shrc-'+i);if(el)el.value=58;}
  const inspFields={'ht-insp-chrc':'35','ht-insp-cpcd':'320','ht-insp-mcd':'0.85','ht-insp-ecd':'0.65 (685Hv1)','ht-insp-ms':'Martensite','ht-insp-ra':'<20%','ht-insp-by':'Test QC'};
  Object.entries(inspFields).forEach(([id2,val])=>{const el=document.getElementById(id2);if(el)el.value=val;});
  await htSaveInspection(id);
  toast('⚡ All HT detail fields filled — tap Complete Charge to finish!');
}

async function htSaveStep1(){

  const chargeNo=document.getElementById('s-ht-new').querySelector('.hdr-sub').textContent;
  const d={
    chargeNo,status:'in_progress',
    date:document.getElementById('ht-date').value,
    shift:document.getElementById('ht-shift').value,

let _htMeohTriggered=false,_htAcetTriggered=false;
function htAddTempReading(id){
  _htMeohTriggered=false;_htAcetTriggered=false;
  const c=S.htCharges.find(x=>x.id===id);
  const n=(c&&c.tempReadings?c.tempReadings.length:0)+1;
  const prevR=c&&c.tempReadings&&c.tempReadings.length?c.tempReadings[c.tempReadings.length-1]:null;
  openModal(`<div class="mtit">Temperature Reading #${n}</div>
  <div class="ibox" style="font-size:11px;margin-bottom:12px">
    🟢 760°C → start Methanol @ 0.7 L/hr &nbsp;|&nbsp; 🟠 890°C → start Acetone
  </div>
  <div class="row2">
    <div class="f"><label>Time *</label><input id="htr-time" type="time" value="${new Date().toTimeString().slice(0,5)}"></div>
    <div class="f"><label>Retort Temp °C *</label><input id="htr-retort" type="number" placeholder="e.g. 760" oninput="htTempHint(this.value)"></div>
  </div>
  <div id="htr-hint" style="font-size:11px;padding:6px 8px;border-radius:6px;margin-bottom:8px;display:none"></div>
  <div class="row2">
    <div class="f"><label>Z1 Temp °C</label><input id="htr-z1" type="number" placeholder="—"></div>
    <div class="f"><label>Z2 Temp °C</label><input id="htr-z2" type="number" placeholder="—"></div>
  </div>
  <div class="row2">
    <div class="f"><label>MV Reading</label><input id="htr-mv" type="number" step="0.01" placeholder="—"></div>
    <div class="f"><label>Methanol Flow (L/hr)</label><input id="htr-meoh" type="number" step="0.1" placeholder="${prevR?prevR.methanol:'0.7'}"></div>
  </div>
  <div class="row2">
    <div class="f"><label>Acetone Flow (L/hr)</label><input id="htr-acet" type="number" step="0.1" placeholder="${prevR?prevR.acetone:'0'}"></div>
    <div class="f"></div>
  </div>
  <div class="f"><label>Remarks</label><input id="htr-rem" type="text" placeholder="e.g. Diffusion M.V. Set-1130"></div>
  <button class="btn btn-p mt12" onclick="htConfirmTempReading('${id}')">Save Reading</button>
  <button class="btn btn-s mt8" onclick="closeModal()">Cancel</button>`);
}
function htTempHint(val){
  const h=document.getElementById('htr-hint');if(!h)return;
  const t=+val;
  if(t>=890){
    if(_htAcetTriggered){h.style.display='none';return}
    _htAcetTriggered=true;
    h.style.display='block';h.style.background='#fff7ed';h.style.color='#c2410c';h.textContent='🟠 890°C reached — start Acetone flow';
  }
  else if(t>=760){
    if(_htMeohTriggered){h.style.display='none';return}
    _htMeohTriggered=true;
    h.style.display='block';h.style.background='#f0fdf4';h.style.color='#15803d';h.textContent='🟢 760°C reached — start Methanol @ 0.7 L/hr';
  }
  else{h.style.display='none';}
}
async function htConfirmTempReading(id){
  const time=document.getElementById('htr-time').value;
  const retort=document.getElementById('htr-retort').value;
  if(!time||!retort){toast('Time and retort temp required');return}
  const c=S.htCharges.find(x=>x.id===id);
  const readings=[...(c&&c.tempReadings||[])];
  if(readings.length>=7){toast('Maximum 7 readings already recorded');closeModal();return}
  readings.push({time,retort:+retort,z1:document.getElementById('htr-z1').value||'',z2:document.getElementById('htr-z2').value||'',mv:document.getElementById('htr-mv').value||'',methanol:document.getElementById('htr-meoh').value||'',acetone:document.getElementById('htr-acet').value||'',remarks:document.getElementById('htr-rem').value.trim()});
  try{
    await db.collection('htCharges').doc(id).update({tempReadings:readings});
    closeModal();toast(`Reading #${readings.length} saved ✓`);
    renderHTDetail(id);
  }catch(e){toast('Error: '+e.message)}
}
async function htDelTempRow(id,idx){
  if(!confirm('Delete this reading?'))return;
  const c=S.htCharges.find(x=>x.id===id);
  const readings=[...(c&&c.tempReadings||[])];
  readings.splice(idx,1);
  try{await db.collection('htCharges').doc(id).update({tempReadings:readings});renderHTDetail(id);}
  catch(e){toast('Error: '+e.message)}
}

async function htSaveQuenching(id){
  const surfHRC=[0,1,2,3,4,5,6].map(i=>document.getElementById('ht-sqhrc-'+i)?.value||'').filter(v=>v);
  const d={quenching:{unloadTime:document.getElementById('ht-unload-time').value,startTime:document.getElementById('ht-qstart').value,oilTempBefore:document.getElementById('ht-q-oil-before').value,oilTempAfter:document.getElementById('ht-q-oil-after').value,washTemp:document.getElementById('ht-q-wash-temp').value,washPh:document.getElementById('ht-q-wash-ph').value,coolingStart:document.getElementById('ht-cool-start').value,surfHRCQuenched:surfHRC}};
  try{await db.collection('htCharges').doc(id).update(d);toast('Quenching saved ✓');}
  catch(e){toast('Error: '+e.message)}

async function htCompleteCharge(id){
  const c=S.htCharges.find(x=>x.id===id);
  if(!c)return;
  const warn=[];
  if(!c.loading||!c.loading.time)warn.push('Loading time not set');
  if(!c.tempReadings||c.tempReadings.length<7)warn.push(`Only ${c.tempReadings?c.tempReadings.length:0}/7 temperature readings recorded`);
  if(!c.quenching||!c.quenching.startTime)warn.push('Quenching time not recorded');
  if(!c.tempering||!c.tempering.unloadingTime)warn.push('Tempering not completed');
  if(warn.length){
    openModal(`<div class="mtit">⚠️ Incomplete Data</div>
    <div class="ibox" style="margin-bottom:12px">${warn.map(w=>`<div>• ${w}</div>`).join('')}</div>
    <div class="tsm tmut" style="margin-bottom:14px">You can still mark as complete and fill missing data later, or go back and complete now.</div>
    <button class="btn btn-p" onclick="closeModal();htForceComplete('${id}')">Mark Complete Anyway</button>
    <button class="btn btn-s mt8" onclick="closeModal()">Go Back & Complete</button>`);
    return;
  }
  htForceComplete(id);
}
async function htForceComplete(id){
  // TODO [ARCHITECTURAL GAP — Per-TAG Yield Approval]:
  // Per the spec (PDF p.19-20), the HT approval gate should NOT be all-or-nothing.
  // Required: Before completing the charge, the inspector must input an "Approved Yield"
  // per individual Route Card (e.g. Card A: 90 pcs approved, 10 flagged for re-harden).
  // Only the approved quantity should receive the heatCode and advance to Hard Stage.
  // The partial-fail qty should create a separate rework flow within HT.
  // CURRENT BEHAVIOUR: All TAGs in the charge receive the heatCode as a block on completion.
  // This is a known gap requiring a full inspection sub-section redesign in htCompleteCharge.
  try{
    const c=S.htCharges.find(x=>x.id===id);
    if(!c){toast('Charge not found');return;}
    await db.collection('htCharges').doc(id).update({status:'complete',completedAt:nowTS(),completedBy:S.sess.userId});
    // THE HEAT CODE MARRIAGE — push heatCode to every participating Route Card
    const components=c.components||[];
    const tagComponents=components.filter(comp=>comp.tagId);
    if(tagComponents.length){
      const heatCode=c.chargeNo; // chargeNo IS the heatCode (e.g. I26F0001)
      let updated=0;
      const rawDb=firebase.firestore();
      for(const comp of tagComponents){
        try{
          await db.collection('routeCards').doc(comp.tagId).update({
            heatCode,
            htChargeId:id,
            status:'ht_done',
            currentStage:'hard',
            updatedAt:nowTS()
          });
          updated++;
        }catch(e2){console.warn('Failed to update TAG '+comp.tagId+':',e2.message);}
      }
      toast('Charge completed ✓ — heatCode "'+heatCode+'" written to '+updated+' TAG(s)');
    } else {
      toast('Charge completed ✓ (no TAGs linked — scan TAGs when adding components)');
    }
    renderHTDetail(id);
  }catch(e){toast('Error: '+e.message)}
}

function getFYPrefix(){
  const now=new Date();
  const yr=now.getFullYear();
  const mo=now.getMonth()+1; // 1-based
  // Financial year starts April 1
  const fyStart=mo>=4?yr:yr-1;
  const fyEnd=(fyStart+1)%100; // last 2 digits
  const fyEndFull=fyStart+1;
  return `FG/${fyStart}-${String(fyEndFull).slice(-2)}/`;
}
function updateInvField(){
  const prefix=document.getElementById('dsp-inv-prefix')?.textContent||getFYPrefix();
  const suffix=document.getElementById('dsp-inv-suffix')?.value||'';
  const hidden=document.getElementById('dsp-inv');
  if(hidden)hidden.value=suffix?prefix+suffix:'';
}

      <div class="tsm tmut">${po.customer} · PO: ${po.poNo}</div></div>

// ── PO Detail ─────────────────────────────────────────────────
function renderDspPoDetail(id){
  S._dspPoId=id;
  const po=S.pos.find(x=>x.id===id);
  if(!po){document.getElementById('s-dsp-po-detail').innerHTML=`<div class="pad"><div class="empty"><h3>PO not found</h3></div></div>`;return}

  // For each line, compute dispatched qty from all dispatches against this PO
  const lineStats=(po.lines||[]).map(ln=>{
    const lineDispatches=[];
    S.dispatches.filter(d=>d.poId===id).forEach(d=>{
      const item=(d.items||[]).find(i=>i.lineId===ln.id);
      if(item)lineDispatches.push({...d,dispQty:+item.qty});
    });
    const dispatched=lineDispatches.reduce((s,d)=>s+d.dispQty,0);
    const pending=Math.max(0,(+ln.qty||0)-dispatched);
    const pct=ln.qty>0?Math.min(100,Math.round(dispatched/ln.qty*100)):0;
    const overdue=pending>0&&ln.dueDate<dateStr();
    return{ln,dispatched,pending,pct,overdue,lineDispatches};
  });

  const allDispatches=S.dispatches.filter(d=>d.poId===id).sort((a,b)=>b.date.localeCompare(a.date));

  document.getElementById('s-dsp-po-detail').innerHTML=`
  <div class="hdr"><button class="hdr-back" onclick="goBack()">←</button>
  <div class="hdr-info"><div class="hdr-title">${po.poNo}</div>
  <div class="hdr-sub">${po.customer} · ${po.poDate}</div></div>
  ${isTanmay()?`<button class="hdr-act" style="padding:7px 9px;font-size:16px" onclick="dspEditPoModal('${id}')">✏️</button><button class="hdr-act" style="background:var(--er);color:#fff;padding:7px 9px;font-size:16px;margin-left:4px" onclick="dspDeletePo('${id}')">🗑</button>`:''}
  <button class="hdr-act" onclick="dspNewDispatchForPo('${id}')">🚚 Dispatch</button>
  </div>
  <div class="pad">

    <!-- PO summary bar -->
    <div class="card" style="padding:10px 14px;margin-bottom:10px">
      <div class="fbw"><span class="tsm tmut">Month: ${po.month||'—'}</span>
      <span class="bdg ${po.status==='closed'?'bdg-r':'bdg-g'}">${po.status==='closed'?'Closed':'Open'}</span></div>
      ${po.remarks?`<div class="tsm tmut" style="margin-top:4px">${po.remarks}</div>`:''}
      ${po.status!=='closed'?`<button class="btn btn-d btn-sm" style="margin-top:8px" onclick="dspClosePo('${id}')">Close PO</button>`:`<button class="btn btn-s btn-sm" style="margin-top:8px" onclick="dspReopenPo('${id}')">Re-open PO</button>`}
    </div>

    <!-- Line-by-line schedule vs dispatched -->
    <div class="slbl">📋 Schedule vs Dispatched</div>
    ${lineStats.map(({ln,dispatched,pending,pct,overdue,lineDispatches})=>`
    <div class="card" style="margin-bottom:10px${overdue?';border-left:3px solid var(--er)':''}">
      <div class="fbw" style="margin-bottom:4px">
        <div><div style="font-weight:700">${ln.partName}</div>
        <div class="tsm tmut">${ln.partNo||'—'}${ln.rate?' · ₹'+ln.rate+'/pc':''}</div></div>
        <div style="text-align:right">
          <span class="bdg ${pct>=100?'bdg-g':overdue?'bdg-r':'bdg-a'}">${pct}%</span>
        </div>
      </div>
      <div class="prog" style="margin-bottom:6px"><div class="pf ${pct>=100?'pf-g':overdue?'pf-r':'pf-a'}" style="width:${pct}%"></div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;font-size:11px;margin-bottom:8px">
        <div style="text-align:center"><div style="color:var(--mut)">Scheduled</div><div style="font-weight:700">${ln.qty} ${ln.unit}</div></div>
        <div style="text-align:center"><div style="color:var(--mut)">Dispatched</div><div style="font-weight:700;color:var(--ok)">${dispatched} ${ln.unit}</div></div>
        <div style="text-align:center"><div style="color:var(--mut)">Pending</div><div style="font-weight:700;color:${overdue?'var(--er)':'var(--wa)'}">${pending} ${ln.unit}</div></div>
      </div>
      <div class="tsm tmut">Due: ${ln.dueDate}${overdue?' ⚠️ OVERDUE':''}</div>
      ${lineDispatches.length?`<div style="margin-top:8px;padding-top:8px;border-top:.5px solid var(--bdr)">
        <div class="tsm tmut" style="margin-bottom:4px">Dispatch history:</div>
        ${lineDispatches.map(d=>`<div class="rrow" style="padding:4px 0;font-size:12px">
          <div><span style="font-weight:600">${d.invoiceNo}</span> <span class="tsm tmut">· ${d.date}</span></div>
          <div style="font-weight:600">${d.dispQty} ${ln.unit}</div>
        </div>`).join('')}
      </div>`:''}
    </div>`).join('')}

    <!-- Invoice history for this PO -->
    <div class="slbl">🧾 Invoice History</div>
    ${allDispatches.length?allDispatches.map(d=>`
    <div class="card" style="margin-bottom:8px;padding:10px 14px">
      <div class="fbw" style="margin-bottom:4px">
        <div><div style="font-weight:700">${d.invoiceNo}</div>
        <div class="tsm tmut">${d.date} · ${d.transportMode||'—'}</div></div>
        <div style="text-align:right">
          <div style="font-size:12px;font-weight:600">${(d.items||[]).reduce((s,i)=>s+(+i.qty||0),0)} pcs total</div>
          ${d.vehicleNo?`<div class="tsm tmut">${d.vehicleNo}</div>`:''}
        </div>
      </div>
      ${(d.items||[]).map(item=>{const ln=(po.lines||[]).find(l=>l.id===item.lineId);return`<div style="padding:3px 0"><span class="tsm tmut">• </span><span class="tsm" style="font-weight:600">${item.partName||ln?.partName||'—'}</span><span class="tsm tmut">: ${item.qty} ${item.unit||ln?.unit||'pcs'}</span>${item.tagId?`<span style="font-family:monospace;font-size:10px;color:var(--acc);margin-left:4px">${item.tagId}</span>`:''}${item.heatCode?`<span style="font-size:10px;color:var(--ok);margin-left:4px">🔥${item.heatCode}</span>`:''}</div>`;}).join('')}
      ${d.remarks?`<div class="tsm tmut" style="margin-top:4px;font-style:italic">${d.remarks}</div>`:''}
      ${isTanmay()?`<button class="btn btn-d btn-sm" style="margin-top:6px" onclick="delDispatch('${d.id}')">🗑 Delete</button>`:''}
    </div>`).join(''):`<div class="empty" style="padding:20px 0"><div class="empty-ic">🚚</div><h3>No dispatches yet</h3></div>`}
    <div style="height:24px"></div>
  </div>`;
}

  showGDrop(inp,matches,p=>{
    inp.value=p.name;

  if(!_poeLines.length){toast('PO must have at least one part line');return}

      month:document.getElementById('poe-month').value,

async function dspDeletePo(id){
  if(!isTanmay())return;
  if(!confirm('Delete this PO and ALL its dispatch records? This cannot be undone.'))return;
  try{
    // Delete all dispatches for this PO
    const sn=await db.collection('dispatches').where('poId','==',id).get();
    const batch=db.batch();
    sn.docs.forEach(d=>batch.delete(d.ref));
    batch.delete(db.collection('pos').doc(id));
    await batch.commit();
    toast('PO and dispatches deleted');
    go('dsp-po-list','dsp-po-detail');
    renderDspPoList();
  }catch(e){toast('Error: '+e.message)}
}
